- main:
  - heading "Privacy policy" [level=1]
  - paragraph: "/Last updated: April \\d+, \\d+/"
  - paragraph: This policy explains what we collect, how we use it, and the choices available to RELab users.
  - article:
    - heading "User information" [level=2]
    - paragraph: When you register, we collect a username, email address, and password for authentication. Passwords are stored only in hashed form. Your email is used for authentication and important service notifications.
  - article:
    - heading "Profile visibility" [level=2]
    - paragraph: By default, your profile and contribution statistics, such as product counts and top categories, are public. You can change visibility to community-only or private at any time in your profile settings. This affects profile details, statistics, and owner attribution; it does not make uploaded product records or media private.
  - article:
    - heading "Uploads and media" [level=2]
    - paragraph: Product records, files, and images you upload may be publicly accessible so the research dataset remains reusable. Uploads are stored on our servers and included in regular backups. We use uploads to display contributions in the app and for research purposes when you choose to contribute.
    - paragraph: You can delete your products and uploaded images in the app. If you need help, contact us and we will remove uploads and linked metadata on request.
  - article:
    - heading "AI and research use" [level=2]
    - paragraph: We may use de-identified research contributions for research purposes only. We do not use personal account information such as email, username, or password to train models.
  - article:
    - heading "Your rights" [level=2]
    - paragraph:
      - strong: "Updates:"
      - text: Public-facing project updates are shared on GitHub and LinkedIn. Optional recurring account update emails will stay tied to authenticated user preferences.
    - paragraph:
      - strong: "Account holders:"
      - text: You may access and update your details, and request deletion of your account and associated data.
    - paragraph:
      - text: Contact
      - link "relab@cml.leidenuniv.nl":
        - /url: mailto:relab@cml.leidenuniv.nl
      - text: for questions or data requests.
