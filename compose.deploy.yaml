# compose.deploy.yaml (DEPLOY — covers prod AND staging)
#
# Single artifact for both environments. ENVIRONMENT (required) selects which.
# Per-environment non-secret knobs live in committed `deploy/env/*.compose.env`
# files; host-local operator inputs for Compose interpolation live in the
# gitignored root `.env`.
#
# Invocation (normally through root just recipes):
#   docker compose -p relab_prod --env-file .env --env-file deploy/env/prod.compose.env \
#                  -f compose.yaml -f compose.deploy.yaml up -d

# spell-checker: ignore REDISCLI, requirepass, tmpfs

# --- Reusable fragments ------------------------------------------------------
# Shipping container logs to a central Loki instance is opt-in: include
# compose.logging.loki.yaml alongside this file (the justfile does this
# automatically when LOKI_URL is set in the host's root .env). Hosts without
# Loki get Docker's default json-file driver — no config needed.

x-backend-public-origins: &backend-public-origins
  BACKEND_API_URL: ${API_PUBLIC_URL:?API_PUBLIC_URL must be set}
  FRONTEND_APP_URL: ${APP_PUBLIC_URL:?APP_PUBLIC_URL must be set}
  FRONTEND_WEB_URL: ${WEB_PUBLIC_URL:?WEB_PUBLIC_URL must be set}
  DOCS_URL: ${DOCS_PUBLIC_URL:?DOCS_PUBLIC_URL must be set}

x-backend-host-overrides: &backend-host-overrides
  GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:?GOOGLE_OAUTH_CLIENT_ID must be set in root .env}
  GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID:?GITHUB_OAUTH_CLIENT_ID must be set in root .env}
  EMAIL_PROVIDER: ${EMAIL_PROVIDER:?EMAIL_PROVIDER must be set in root .env}
  EMAIL_HOST: ${EMAIL_HOST:-}
  EMAIL_USERNAME: ${EMAIL_USERNAME:-}
  EMAIL_FROM: ${EMAIL_FROM:?EMAIL_FROM must be set in root .env}
  EMAIL_REPLY_TO: ${EMAIL_REPLY_TO:?EMAIL_REPLY_TO must be set in root .env}
  MICROSOFT_GRAPH_TENANT_ID: ${MICROSOFT_GRAPH_TENANT_ID:-}
  MICROSOFT_GRAPH_CLIENT_ID: ${MICROSOFT_GRAPH_CLIENT_ID:-}
  MICROSOFT_GRAPH_SENDER_USER: ${MICROSOFT_GRAPH_SENDER_USER:-}
  MICROSOFT_GRAPH_SAVE_TO_SENT_ITEMS: ${MICROSOFT_GRAPH_SAVE_TO_SENT_ITEMS:-false}
  SUPERUSER_EMAIL: ${SUPERUSER_EMAIL:?SUPERUSER_EMAIL must be set in root .env}
  SUPERUSER_NAME: ${SUPERUSER_NAME:-}

x-backend-runtime-secrets: &backend-runtime-secrets
  - database_app_password
  - database_migration_password
  - database_backup_password
  - redis_password
  - fastapi_users_secret
  - oauth_state_secret
  - cache_signing_secret
  - data_encryption_key
  - google_oauth_client_secret
  - github_oauth_client_secret
  - email_password
  - microsoft_graph_client_secret
  - superuser_password

services:
  api:
    image: relab-backend:${ENVIRONMENT}-local
    read_only: true
    user: "1001:1001"
    secrets: *backend-runtime-secrets
    tmpfs:
      - /tmp:mode=1777
    environment:
      <<: [*backend-public-origins, *backend-host-overrides]
      ENVIRONMENT: ${ENVIRONMENT:?ENVIRONMENT must be set}
      # Trust forwarded headers only from Docker-internal proxy addresses.
      FORWARDED_ALLOW_IPS: 172.16.0.0/12
      # OpenTelemetry — OTEL_EXPORTER_OTLP_ENDPOINT is the on/off switch;
      # leave unset in root .env to disable. OTEL_SERVICE_NAME is read by the
      # OTEL SDK automatically from the container env and matches the compose
      # service name so traces group cleanly in the backend.
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      OTEL_SERVICE_NAME: relab-api
      # ── Resource knobs ──────────────────────────────────────────────────────────
      # WEB_CONCURRENCY = Uvicorn worker processes (~1 CPU core each).
      # All other values are per worker; totals = WEB_CONCURRENCY x per-worker value.
      # Prod: 4, Staging: 2, small VMs: 1.
      #
      #                    per worker  x  workers  =  total (prod)
      # Image threads:          5      x     4     =   20  (CPU-bound)
      # DB connections:    10 + 10     x     4     =   80  (PostgreSQL default max=100)
      # Outbound HTTP:        100      x     4     =  400  (mostly idle)
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-4}
      IMAGE_RESIZE_WORKERS: "5"
      DB_POOL_SIZE: "10"
      DB_POOL_MAX_OVERFLOW: "10"
      UVICORN_LIMIT_CONCURRENCY: "100"

  migrator:
    image: relab-backend-migrations:${ENVIRONMENT}-local
    read_only: true
    user: "1001:1001"
    secrets: *backend-runtime-secrets
    environment:
      <<: [*backend-public-origins, *backend-host-overrides]
      ENVIRONMENT: ${ENVIRONMENT:?ENVIRONMENT must be set}
    tmpfs:
      - /tmp:mode=1777

  backup:
    # Encrypted logical PostgreSQL + user upload backups.
    build:
      context: ./backend
      dockerfile: Dockerfile.backups
    image: relab-backup:${ENVIRONMENT}-local
    cap_drop:
      - ALL
    pids_limit: 512
    read_only: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 8192
        hard: 8192
    user: "1001:1001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - user_uploads:/data/uploads:ro
      - ${BACKUP_DIR:-./backups}/restic:/restic
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      POSTGRES_DB: relab_db
      DATABASE_BACKUP_USER: relab_backup
      DATABASE_BACKUP_PASSWORD_FILE: /run/secrets/database_backup_password
      RESTIC_PASSWORD_FILE: /run/secrets/restic_password
      RESTIC_REPOSITORY: /restic
      RESTIC_CACHE_DIR: /tmp/restic-cache
      XDG_CACHE_HOME: /tmp/xdg-cache
      UPLOADS_DIR: /data/uploads
      BACKUP_WORK_DIR: /tmp/relab-backups
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_ON_START: "true"
      RESTIC_KEEP_HOURLY: ${RESTIC_KEEP_HOURLY:-24}
      RESTIC_KEEP_DAILY: ${RESTIC_KEEP_DAILY:-14}
      RESTIC_KEEP_WEEKLY: ${RESTIC_KEEP_WEEKLY:-8}
      RESTIC_KEEP_MONTHLY: ${RESTIC_KEEP_MONTHLY:-12}
    secrets:
      - database_backup_password
      - restic_password
    profiles:
      - backups
    tmpfs:
      - /tmp:mode=1777
    networks:
      - data

  redis:
    secrets:
      - redis_password
    volumes:
      # Persist cache data in both prod and staging (AOF persistence).
      - cache_data:/data
    healthcheck:
      test: [ "CMD-SHELL", "REDISCLI_AUTH=\"$$(cat /run/secrets/redis_password)\" redis-cli ping | grep -q PONG" ]
    command:
      - sh
      - -c
      - |
        redis_password="$$(cat /run/secrets/redis_password)"
        exec redis-server --appendonly yes --save 60 1 --requirepass "$$redis_password"

  cloudflared:
    # Cloudflared tunnel service
    image: cloudflare/cloudflared:2026.3.0@sha256:6b599ca3e974349ead3286d178da61d291961182ec3fe9c505e1dd02c8ac31b0
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:?TUNNEL_TOKEN must be set (in root .env on the deploy host)}
    command: tunnel --no-autoupdate run
    pull_policy: always
    networks:
      - edge

  postgres:
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: relab_db
      DATABASE_APP_USER: relab_app
      DATABASE_MIGRATION_USER: relab_migrator
      DATABASE_BACKUP_USER: relab_backup
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      DATABASE_APP_PASSWORD_FILE: /run/secrets/database_app_password
      DATABASE_MIGRATION_PASSWORD_FILE: /run/secrets/database_migration_password
      DATABASE_BACKUP_PASSWORD_FILE: /run/secrets/database_backup_password
    secrets:
      - postgres_password
      - database_app_password
      - database_migration_password
      - database_backup_password

  docs:
    image: relab-docs:${ENVIRONMENT}-local
    read_only: true
    user: "1001:1001"
    build:
      args:
        ENVIRONMENT: ${ENVIRONMENT:?ENVIRONMENT must be set}
        PUBLIC_DOCS_URL: ${DOCS_PUBLIC_URL:?DOCS_PUBLIC_URL must be set}
        PUBLIC_BACKEND_API_URL: ${API_PUBLIC_URL:?API_PUBLIC_URL must be set}
    environment:
      # Needed by Caddyfile so API reference pages can fetch live OpenAPI JSON.
      CADDY_API_ORIGIN: ${API_PUBLIC_URL:?API_PUBLIC_URL must be set}
    tmpfs:
      - /config:uid=1001,gid=1001
      - /data:uid=1001,gid=1001
      - /tmp:mode=1777

  app:
    image: relab-app:${ENVIRONMENT}-local
    read_only: true
    user: "1001:1001"
    build:
      args:
        ENVIRONMENT: ${ENVIRONMENT:?ENVIRONMENT must be set}
        EXPO_PUBLIC_API_URL: ${API_PUBLIC_URL:?API_PUBLIC_URL must be set}
        EXPO_PUBLIC_WEBSITE_URL: ${WEB_PUBLIC_URL:?WEB_PUBLIC_URL must be set}
        EXPO_PUBLIC_DOCS_URL: ${DOCS_PUBLIC_URL:?DOCS_PUBLIC_URL must be set}
    environment:
      # Needed by Caddyfile to determine the API origin.
      CADDY_API_ORIGIN: ${API_PUBLIC_URL:?API_PUBLIC_URL must be set}
    tmpfs:
      - /config:uid=1001,gid=1001
      - /data:uid=1001,gid=1001
      - /tmp:mode=1777

  www:
    image: relab-www:${ENVIRONMENT}-local
    read_only: true
    user: "1001:1001"
    build:
      args:
        ENVIRONMENT: ${ENVIRONMENT:?ENVIRONMENT must be set}
        PUBLIC_APP_URL: ${APP_PUBLIC_URL:?APP_PUBLIC_URL must be set}
        PUBLIC_DOCS_URL: ${DOCS_PUBLIC_URL:?DOCS_PUBLIC_URL must be set}
        PUBLIC_SITE_URL: ${WEB_PUBLIC_URL:?WEB_PUBLIC_URL must be set}
    tmpfs:
      - /config:uid=1001,gid=1001
      - /data:uid=1001,gid=1001
      - /tmp:mode=1777

volumes:
  cache_data:

secrets:
  postgres_password:
    file: ./secrets/${ENVIRONMENT}/postgres_password
  database_app_password:
    file: ./secrets/${ENVIRONMENT}/database_app_password
  database_migration_password:
    file: ./secrets/${ENVIRONMENT}/database_migration_password
  database_backup_password:
    file: ./secrets/${ENVIRONMENT}/database_backup_password
  redis_password:
    file: ./secrets/${ENVIRONMENT}/redis_password
  restic_password:
    file: ./secrets/${ENVIRONMENT}/restic_password
  fastapi_users_secret:
    file: ./secrets/${ENVIRONMENT}/fastapi_users_secret
  oauth_state_secret:
    file: ./secrets/${ENVIRONMENT}/oauth_state_secret
  cache_signing_secret:
    file: ./secrets/${ENVIRONMENT}/cache_signing_secret
  data_encryption_key:
    file: ./secrets/${ENVIRONMENT}/data_encryption_key
  google_oauth_client_secret:
    file: ./secrets/${ENVIRONMENT}/google_oauth_client_secret
  github_oauth_client_secret:
    file: ./secrets/${ENVIRONMENT}/github_oauth_client_secret
  email_password:
    file: ./secrets/${ENVIRONMENT}/email_password
  microsoft_graph_client_secret:
    file: ./secrets/${ENVIRONMENT}/microsoft_graph_client_secret
  superuser_password:
    file: ./secrets/${ENVIRONMENT}/superuser_password
