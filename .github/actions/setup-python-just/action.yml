# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
name: Setup Python + just
description: Install Python, uv, and just for workflow jobs.

inputs:
  python-version:
    description: Python version to install.
    required: true
  uv-cache-dependency-glob:
    description: Newline-delimited dependency files for uv cache keys.
    required: true

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        cache-dependency-glob: ${{ inputs.uv-cache-dependency-glob }}

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install just
      uses: extractions/setup-just@v3
