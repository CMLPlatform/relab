# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
name: Setup Runtime
description: Install just plus optional Python/uv or Node.js + pnpm toolchains. Versions come from .tool-versions and the root packageManager field.

inputs:
  setup-python:
    description: Install uv + Python (version from .tool-versions).
    required: false
    default: "false"
  setup-node:
    description: Install pnpm + Node.js (Node version from .tool-versions, pnpm version from root packageManager).
    required: false
    default: "false"
  uv-cache-dependency-glob:
    description: Newline-delimited dependency files for uv cache keys.
    required: false
    default: ""
  cache-dependency-path:
    description: Lockfile path(s) used for pnpm cache keys.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install uv
      if: inputs.setup-python == 'true'
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
      with:
        enable-cache: true
        cache-dependency-glob: ${{ inputs.uv-cache-dependency-glob }}

    - name: Set up Python
      if: inputs.setup-python == 'true'
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
      with:
        python-version-file: .tool-versions

    - name: Install pnpm
      if: inputs.setup-node == 'true'
      uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1

    - name: Set up Node.js
      if: inputs.setup-node == 'true'
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
      with:
        node-version-file: .tool-versions
        cache: pnpm
        cache-dependency-path: ${{ inputs.cache-dependency-path }}

    - name: Install just
      uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3
