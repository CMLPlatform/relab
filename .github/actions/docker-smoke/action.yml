# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
# spell-checker: ignore esac
name: Docker Smoke
description: |
  Run an allowlisted just-defined docker smoke recipe on a fresh checkout with Buildx.
  Shared by the scheduled/dispatched docker-smoke matrix.

inputs:
  recipe:
    description: The just recipe to invoke (e.g. docker-smoke-backend).
    required: true

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        persist-credentials: false

    - name: Set up runtime
      uses: ./.github/actions/setup-runtime

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

    - name: Run smoke test
      shell: bash
      env:
        RECIPE: ${{ inputs.recipe }}
      run: |
        case "$RECIPE" in
          docker-smoke-backend|docker-orchestration-smoke|docker-smoke-www|docker-smoke-app|docker-smoke-docs|docker-smoke-backups)
            just "$RECIPE"
            ;;
          *)
            echo "Unsupported docker smoke recipe: $RECIPE" >&2
            exit 1
            ;;
        esac
