# Codecov configuration
# https://docs.codecov.com/docs/codecovyml-reference
# spell-checker: ignore carryforward

coverage:
  # Overall project status check, requires all flags to report before posting
  status:
    project:
      default:
        # Don't fail the PR if coverage drops by a small amount
        threshold: 2%
        # Wait for all uploaders before posting the status
        if_not_found: success
        if_ci_failed: error
    patch:
      default:
        threshold: 2%
        if_not_found: success
        if_ci_failed: error

flag_management:
  default_rules:
    # Keep flag data for 30 days so coverage is still shown on older PRs
    carryforward: true

flags:
  backend:
    paths:
      - backend/
    carryforward: true

  app:
    paths:
      - app/
    carryforward: true

  www:
    paths:
      - www/
    carryforward: true

# Path resolution note:
# Frontend LCOV uploads contain paths relative to their subrepo (for example
# "src/app/index.tsx"). CI passes an explicit network_prefix per upload, so
# Codecov resolves those files against "app/" and "www/"
# without relying on repository-wide path search heuristics.

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true
