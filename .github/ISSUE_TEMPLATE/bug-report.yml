name: Bug report
description: Report a bug
title: "bug: "
labels: [bug]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - backend
        - www
        - app
        - docs
        - infrastructure
        - other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug and its impact.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: How to reproduce
      description: Minimal steps that trigger the bug.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Git SHA, release tag, or build number.

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, browser, device, or runtime version (only if relevant).

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, failing CI run links, etc.
