name: Feature request
description: Propose an improvement
title: "feat: "
labels: [feature request]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - backend
        - frontend-web
        - frontend-app
        - docs
        - infrastructure
        - cross-cutting
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are users trying to do, and what's getting in the way?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: The smallest change that would solve it.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches and why they were set aside.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, prior discussion, or related issues.
