# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Performance Baseline

on:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  backend-perf-baseline:
    name: Backend Perf Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Run CI-stack backend perf baseline
        run: just docker-ci-perf-baseline

      - name: Archive perf artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-perf-baseline-artifacts
          path: |
            backend/reports/performance/latest-k6-summary.json
            backend/reports/performance/*.md
          retention-days: 14
