# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

# spell-checker: ignore rhysd

name: Validate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run-policy: ${{ steps.decide.outputs.run-policy }}
      run-backend: ${{ steps.decide.outputs.run-backend }}
      run-frontend-web: ${{ steps.decide.outputs.run-frontend-web }}
      run-frontend-app: ${{ steps.decide.outputs.run-frontend-app }}
      run-docs: ${{ steps.decide.outputs.run-docs }}
      run-e2e: ${{ steps.decide.outputs.run-e2e }}
      is-renovate-pr: ${{ steps.detect.outputs.is-renovate-pr }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Detect changes
        id: detect
        uses: ./.github/actions/detect-changes

      - name: Decide which CI jobs should run
        id: decide
        shell: bash
        env:
          IS_SCHEDULE: ${{ steps.detect.outputs.is-schedule }}
          IS_DISPATCH: ${{ steps.detect.outputs.is-dispatch }}
          SHARED: ${{ steps.detect.outputs.shared }}
          POLICY: ${{ steps.detect.outputs.policy }}
          BACKEND: ${{ steps.detect.outputs.backend }}
          FRONTEND_WEB: ${{ steps.detect.outputs.frontend-web }}
          FRONTEND_APP: ${{ steps.detect.outputs.frontend-app }}
          DOCS: ${{ steps.detect.outputs.docs }}
        run: |
          # Scheduled runs only exercise docker-smoke; skip all other jobs.
          if [[ "$IS_SCHEDULE" == "true" ]]; then
            for k in run-policy run-backend run-frontend-web run-frontend-app run-docs run-e2e; do
              echo "$k=false" >> "$GITHUB_OUTPUT"
            done
            exit 0
          fi

          # Manual dispatch runs exercise everything.
          if [[ "$IS_DISPATCH" == "true" ]]; then
            for k in run-policy run-backend run-frontend-web run-frontend-app run-docs run-e2e; do
              echo "$k=true" >> "$GITHUB_OUTPUT"
            done
            exit 0
          fi

          # Path-based filtering for push/pull_request events.
          {
            echo "run-policy=$([[ "$SHARED" == "true" || "$POLICY" == "true" ]] && echo true || echo false)"
            echo "run-backend=$([[ "$SHARED" == "true" || "$BACKEND" == "true" ]] && echo true || echo false)"
            echo "run-frontend-web=$([[ "$SHARED" == "true" || "$FRONTEND_WEB" == "true" ]] && echo true || echo false)"
            echo "run-frontend-app=$([[ "$SHARED" == "true" || "$FRONTEND_APP" == "true" ]] && echo true || echo false)"
            echo "run-docs=$([[ "$SHARED" == "true" || "$DOCS" == "true" ]] && echo true || echo false)"
            echo "run-e2e=$([[ "$SHARED" == "true" || "$BACKEND" == "true" || "$FRONTEND_APP" == "true" ]] && echo true || echo false)"
          } >> "$GITHUB_OUTPUT"

  automation:
    name: Automation and Compose Policy
    needs: [ changes ]
    if: github.event_name != 'schedule' && needs.changes.outputs.run-policy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up runtime
        uses: ./.github/actions/setup-runtime
        with:
          setup-python: "true"
          setup-node: "true"
          uv-cache-dependency-glob: |
            pyproject.toml
            uv.lock
            backend/uv.lock

      - name: Compute pre-commit cache key
        run: echo "PY=$(python -VV | sha256sum | cut -d' ' -f1)" >> "$GITHUB_ENV"

      - name: Cache pre-commit environments
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.cache/pre-commit
          key: pre-commit|${{ runner.os }}|${{ env.PY }}|${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pre-commit checks
        run: >-
          ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'SKIP=no-commit-to-branch ' || '' }}uv run pre-commit run --all-files --show-diff-on-failure

      - name: Check shared dep version alignment
        run: pnpm run syncpack:check

      - name: Validate Compose stacks
        run: just compose-config

      - name: Publish summary
        run: |
          {
            echo "### Validation automation"
            echo
            echo "- repository policy checks passed"
            echo "- shared dep versions aligned across subrepos"
            echo "- Compose configs rendered successfully"
            echo "- GitHub workflow lint passed via pre-commit"
          } >> "$GITHUB_STEP_SUMMARY"

  backend:
    name: Backend
    needs: [ changes ]
    if: needs.changes.outputs.run-backend == 'true' && github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up runtime
        uses: ./.github/actions/setup-runtime
        with:
          setup-python: "true"
          uv-cache-dependency-glob: backend/uv.lock

      - name: Install dependencies
        run: just backend/install

      - name: Run check
        run: just backend/check

      - name: Run CI test suite
        run: just backend/test-ci

      - name: Upload coverage
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: ./.github/actions/upload-codecov
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./backend/reports/coverage/coverage.xml
          flags: backend
          name: validate-backend-coverage

      - name: Archive backend reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: validate-backend-reports
          path: |
            backend/reports/coverage/html/
            backend/reports/coverage/coverage.xml
          retention-days: 7

  frontend-web:
    name: Frontend Web
    needs: [ changes ]
    if: needs.changes.outputs.run-frontend-web == 'true' && github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up runtime
        uses: ./.github/actions/setup-runtime
        with:
          setup-node: "true"
          cache-dependency-path: frontend-web/pnpm-lock.yaml

      - name: Install dependencies
        run: just frontend-web/install

      - name: Run check
        run: just frontend-web/check

      - name: Run CI test suite
        run: just frontend-web/test-ci

      - name: Upload coverage
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: ./.github/actions/upload-codecov
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./frontend-web/coverage/lcov.info
          flags: frontend-web
          name: validate-frontend-web-coverage
          disable-search: "true"
          network-prefix: frontend-web/

      - name: Archive frontend-web coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: validate-frontend-web-coverage
          path: frontend-web/coverage/
          retention-days: 7

  e2e-frontend-web:
    name: Frontend Web E2E
    needs: [ changes ]
    if: github.event_name == 'workflow_dispatch' || (needs.changes.outputs.run-frontend-web == 'true' && github.event_name != 'schedule' && needs.changes.outputs.is-renovate-pr != 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up runtime
        uses: ./.github/actions/setup-runtime
        with:
          setup-node: "true"
          cache-dependency-path: frontend-web/pnpm-lock.yaml

      - name: Install dependencies
        run: just frontend-web/install

      - name: Build site
        run: just frontend-web/build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox webkit
        working-directory: frontend-web

      - name: Run browser E2E tests
        run: just frontend-web/test-e2e

      - name: Archive Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: validate-frontend-web-playwright
          path: frontend-web/playwright-report/
          retention-days: 7

  frontend-app:
    name: Frontend App
    needs: [ changes ]
    if: needs.changes.outputs.run-frontend-app == 'true' && github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up runtime
        uses: ./.github/actions/setup-runtime
        with:
          setup-node: "true"
          cache-dependency-path: frontend-app/pnpm-lock.yaml

      - name: Install dependencies
        run: just frontend-app/install

      - name: Run check
        run: just frontend-app/check

      - name: Run CI test suite
        run: just frontend-app/test-ci

      - name: Upload coverage
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: ./.github/actions/upload-codecov
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./frontend-app/coverage/lcov.info
          flags: frontend-app
          name: validate-frontend-app-coverage
          disable-search: "true"
          network-prefix: frontend-app/

      - name: Archive frontend-app coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: validate-frontend-app-coverage
          path: frontend-app/coverage/
          retention-days: 7

  docs:
    name: Docs
    needs: [ changes ]
    if: needs.changes.outputs.run-docs == 'true' && github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up runtime
        uses: ./.github/actions/setup-runtime
        with:
          setup-node: "true"
          cache-dependency-path: docs/pnpm-lock.yaml

      - name: Install dependencies
        run: just docs/install

      - name: Run docs check
        run: just docs/check

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: docs

      - name: Run docs CI test suite
        run: just docs/test-ci

  e2e-full-stack:
    name: Frontend App Full-Stack E2E
    needs: [ changes ]
    if: github.event_name == 'workflow_dispatch' || (needs.changes.outputs.run-e2e == 'true' && github.event_name == 'push')
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      E2E_BACKEND_PORT: "18432"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Set up runtime
        uses: ./.github/actions/setup-runtime
        with:
          setup-node: "true"
          cache-dependency-path: frontend-app/pnpm-lock.yaml

      - name: Install frontend-app dependencies
        run: just frontend-app/install

      - name: Build Expo web app for local E2E backend
        run: just frontend-app/build-web

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: frontend-app

      - name: Run full-stack E2E tests
        run: just test-e2e-full-stack

      - name: Archive Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: validate-frontend-app-e2e
          path: frontend-app/playwright-report/
          retention-days: 7

  docker-smoke:
    name: Docker Smoke (${{ matrix.recipe }})
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        recipe:
          - docker-smoke-backend
          - docker-orchestration-smoke
          - docker-smoke-frontend-web
          - docker-smoke-frontend-app
          - docker-smoke-docs
          - docker-smoke-user-upload-backups
    steps:
      - name: Run smoke recipe
        uses: ./.github/actions/docker-smoke
        with:
          recipe: ${{ matrix.recipe }}

  validate-result:
    name: Validate Result
    # Keep blocking jobs in sync between `needs` and the JSON passed to
    # check-required-jobs; skipped jobs are accepted, failed/cancelled jobs fail.
    if: always()
    needs:
      - changes
      - automation
      - backend
      - frontend-web
      - e2e-frontend-web
      - frontend-app
      - docs
      - e2e-full-stack
      - docker-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Check validate jobs
        uses: ./.github/actions/check-required-jobs
        with:
          results: >-
            {
              "changes": "${{ needs.changes.result }}",
              "automation": "${{ needs.automation.result }}",
              "backend": "${{ needs.backend.result }}",
              "frontend-web": "${{ needs.frontend-web.result }}",
              "e2e-frontend-web": "${{ needs.e2e-frontend-web.result }}",
              "frontend-app": "${{ needs.frontend-app.result }}",
              "docs": "${{ needs.docs.result }}",
              "e2e-full-stack": "${{ needs.e2e-full-stack.result }}",
              "docker-smoke": "${{ needs.docker-smoke.result }}"
            }
