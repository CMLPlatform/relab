# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

# spell-checker: ignore rhysd

name: Validate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run-policy: ${{ steps.decide.outputs.run-policy }}
      run-backend: ${{ steps.decide.outputs.run-backend }}
      run-www: ${{ steps.decide.outputs.run-www }}
      run-app: ${{ steps.decide.outputs.run-app }}
      run-docs: ${{ steps.decide.outputs.run-docs }}
      run-e2e: ${{ steps.decide.outputs.run-e2e }}
      is-renovate-pr: ${{ steps.detect.outputs.is-renovate-pr }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Detect changes
        id: detect
        uses: ./.github/actions/detect-changes

      - name: Decide which CI jobs should run
        id: decide
        shell: bash
        env:
          IS_SCHEDULE: ${{ steps.detect.outputs.is-schedule }}
          IS_DISPATCH: ${{ steps.detect.outputs.is-dispatch }}
          SHARED: ${{ steps.detect.outputs.shared }}
          POLICY: ${{ steps.detect.outputs.policy }}
          BACKEND: ${{ steps.detect.outputs.backend }}
          WWW: ${{ steps.detect.outputs.www }}
          APP: ${{ steps.detect.outputs.app }}
          DOCS: ${{ steps.detect.outputs.docs }}
        run: |
          # Scheduled runs only exercise docker-smoke; skip all other jobs.
          if [[ "$IS_SCHEDULE" == "true" ]]; then
            for k in run-policy run-backend run-www run-app run-docs run-e2e; do
              echo "$k=false" >> "$GITHUB_OUTPUT"
            done
            exit 0
          fi

          # Manual dispatch runs exercise everything.
          if [[ "$IS_DISPATCH" == "true" ]]; then
            for k in run-policy run-backend run-www run-app run-docs run-e2e; do
              echo "$k=true" >> "$GITHUB_OUTPUT"
            done
            exit 0
          fi

          # Path-based filtering for push/pull_request events.
          {
            echo "run-policy=$([[ "$SHARED" == "true" || "$POLICY" == "true" ]] && echo true || echo false)"
            echo "run-backend=$([[ "$SHARED" == "true" || "$BACKEND" == "true" ]] && echo true || echo false)"
            echo "run-www=$([[ "$SHARED" == "true" || "$WWW" == "true" ]] && echo true || echo false)"
            echo "run-app=$([[ "$SHARED" == "true" || "$APP" == "true" ]] && echo true || echo false)"
            echo "run-docs=$([[ "$SHARED" == "true" || "$DOCS" == "true" ]] && echo true || echo false)"
            echo "run-e2e=$([[ "$SHARED" == "true" || "$BACKEND" == "true" || "$APP" == "true" ]] && echo true || echo false)"
          } >> "$GITHUB_OUTPUT"

  automation:
    name: Automation, IaC, and Compose Policy
    needs: [ changes ]
    if: github.event_name != 'schedule' && needs.changes.outputs.run-policy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up runtime
        uses: ./.github/actions/setup-runtime
        with:
          setup-python: "true"
          setup-node: "true"
          uv-cache-dependency-glob: |
            pyproject.toml
            uv.lock
            backend/uv.lock

      - name: Compute pre-commit cache key
        run: echo "PY=$(python -VV | sha256sum | cut -d' ' -f1)" >> "$GITHUB_ENV"

      - name: Cache pre-commit environments
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.cache/pre-commit
          key: pre-commit|${{ runner.os }}|${{ env.PY }}|${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@9d84900f3238fab8cd84ce47d658d25dd008be2f
        with:
          tofu_wrapper: false

      - name: Run pre-commit checks
        run: >-
          ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'SKIP=no-commit-to-branch ' || '' }}uv run pre-commit run --all-files --show-diff-on-failure

      - name: Check shared dep version alignment
        run: pnpm run syncpack:check

      - name: Validate Cloudflare edge IaC
        run: just cloudflare-check

      - name: Validate environment variable policy
        run: just env-policy-check

      - name: Validate Compose stacks
        run: just compose-config

      - name: Validate deploy secret paths
        run: just deploy-secrets-check

      - name: Publish summary
        run: |
          {
            echo "### Validation automation"
            echo
            echo "- repository policy checks passed"
            echo "- shared dep versions aligned across subrepos"
            echo "- Cloudflare edge IaC validated"
            echo "- environment variable policy validated"
            echo "- Compose configs rendered successfully"
            echo "- deploy secret file paths matched rendered Compose"
            echo "- GitHub workflow lint passed via pre-commit"
          } >> "$GITHUB_STEP_SUMMARY"

  backend:
    name: Backend
    needs: [ changes ]
    if: needs.changes.outputs.run-backend == 'true' && github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up runtime
        uses: ./.github/actions/setup-runtime
        with:
          setup-python: "true"
          uv-cache-dependency-glob: backend/uv.lock

      - name: Install dependencies
        run: just backend/install

      - name: Run check
        run: just backend/check

      - name: Run CI test suite
        run: just backend/test-ci

      - name: Upload coverage
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: ./.github/actions/upload-codecov
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./backend/reports/coverage/coverage.xml
          flags: backend
          name: validate-backend-coverage

      - name: Archive backend reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: validate-backend-reports
          path: |
            backend/reports/coverage/html/
            backend/reports/coverage/coverage.xml
          retention-days: 7

  www:
    name: www
    needs: [ changes ]
    if: needs.changes.outputs.run-www == 'true' && github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up runtime
        uses: ./.github/actions/setup-runtime
        with:
          setup-node: "true"
          cache-dependency-path: www/pnpm-lock.yaml

      - name: Install dependencies
        run: just www/install

      - name: Run check
        run: just www/check

      - name: Run CI test suite
        run: just www/test-ci

      - name: Upload coverage
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: ./.github/actions/upload-codecov
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./www/coverage/lcov.info
          flags: www
          name: validate-www-coverage
          disable-search: "true"
          network-prefix: www/

      - name: Archive www coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: validate-www-coverage
          path: www/coverage/
          retention-days: 7

  e2e-www:
    name: www E2E
    needs: [ changes ]
    if: github.event_name == 'workflow_dispatch' || (needs.changes.outputs.run-www == 'true' && github.event_name != 'schedule' && needs.changes.outputs.is-renovate-pr != 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up runtime
        uses: ./.github/actions/setup-runtime
        with:
          setup-node: "true"
          cache-dependency-path: www/pnpm-lock.yaml

      - name: Install dependencies
        run: just www/install

      - name: Build site
        run: just www/build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox webkit
        working-directory: www

      - name: Run browser E2E tests
        run: just www/test-e2e

      - name: Archive Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: validate-www-playwright
          path: www/playwright-report/
          retention-days: 7

  app:
    name: App
    needs: [ changes ]
    if: needs.changes.outputs.run-app == 'true' && github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up runtime
        uses: ./.github/actions/setup-runtime
        with:
          setup-node: "true"
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install dependencies
        run: just app/install

      - name: Run check
        run: just app/check

      - name: Run CI test suite
        run: just app/test-ci

      - name: Upload coverage
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: ./.github/actions/upload-codecov
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./app/coverage/lcov.info
          flags: app
          name: validate-app-coverage
          disable-search: "true"
          network-prefix: app/

      - name: Archive app coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: validate-app-coverage
          path: app/coverage/
          retention-days: 7

  docs:
    name: Docs
    needs: [ changes ]
    if: needs.changes.outputs.run-docs == 'true' && github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up runtime
        uses: ./.github/actions/setup-runtime
        with:
          setup-node: "true"
          cache-dependency-path: docs/pnpm-lock.yaml

      - name: Install dependencies
        run: just docs/install

      - name: Run docs check
        run: just docs/check

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: docs

      - name: Run docs CI test suite
        run: just docs/test-ci

  e2e-full-stack:
    name: App Full-Stack E2E
    needs: [ changes ]
    if: github.event_name == 'workflow_dispatch' || (needs.changes.outputs.run-e2e == 'true' && github.event_name == 'push')
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      E2E_BACKEND_PORT: "18432"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Set up runtime
        uses: ./.github/actions/setup-runtime
        with:
          setup-node: "true"
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install app dependencies
        run: just app/install

      - name: Build Expo web app for local E2E backend
        run: just app/build-web

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: app

      - name: Run full-stack E2E tests
        run: just test-e2e-full-stack

      - name: Archive Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: validate-app-e2e
          path: app/playwright-report/
          retention-days: 7

  docker-smoke:
    name: Docker Smoke (${{ matrix.recipe }})
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        recipe:
          - docker-smoke-backend
          - docker-orchestration-smoke
          - docker-smoke-www
          - docker-smoke-app
          - docker-smoke-docs
          - docker-smoke-backups
    steps:
      - name: Run smoke recipe
        uses: ./.github/actions/docker-smoke
        with:
          recipe: ${{ matrix.recipe }}

  validate-result:
    name: Validate Result
    # Keep blocking jobs in sync between `needs` and the JSON passed to
    # check-required-jobs; skipped jobs are accepted, failed/cancelled jobs fail.
    if: always()
    needs:
      - changes
      - automation
      - backend
      - www
      - e2e-www
      - app
      - docs
      - e2e-full-stack
      - docker-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Check validate jobs
        uses: ./.github/actions/check-required-jobs
        with:
          results: >-
            {
              "changes": "${{ needs.changes.result }}",
              "automation": "${{ needs.automation.result }}",
              "backend": "${{ needs.backend.result }}",
              "www": "${{ needs.www.result }}",
              "e2e-www": "${{ needs.e2e-www.result }}",
              "app": "${{ needs.app.result }}",
              "docs": "${{ needs.docs.result }}",
              "e2e-full-stack": "${{ needs.e2e-full-stack.result }}",
              "docker-smoke": "${{ needs.docker-smoke.result }}"
            }
