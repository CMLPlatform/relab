# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Security

on:
  schedule:
    - cron: "0 2 * * 1"
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

defaults:
  run:
    shell: bash

env:
  PYTHON_VERSION: "3.14"
  NODE_VERSION: "22"

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run-root-python: ${{ steps.detect.outputs.run-root-python }}
      run-backend-python: ${{ steps.detect.outputs.run-backend-python }}
      run-docs-python: ${{ steps.detect.outputs.run-docs-python }}
      run-frontend-app-node: ${{ steps.detect.outputs.run-frontend-app-node }}
      run-frontend-web-node: ${{ steps.detect.outputs.run-frontend-web-node }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect changes
        id: detect
        uses: ./.github/actions/detect-security-changes

  secret-scan:
    name: Secret Scan
    if: github.event_name != 'merge_group'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.28.0"
          GITLEAKS_SHA256: "a65b5253807a68ac0cafa4414031fd740aeb55f54fb7e55f386acb52e6a840eb"
        run: |
          curl -sSfL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum --check --strict
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks

      - name: Run gitleaks
        run: ./gitleaks git --verbose --redact .

  python-audit-root:
    name: Python Audit (root)
    needs: [ changes ]
    if: needs.changes.outputs.run-root-python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python tooling
        uses: ./.github/actions/setup-python-just
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-cache-dependency-glob: uv.lock

      - name: Install root dependencies
        run: uv sync

      - name: Run root dependency audit
        run: just audit-root

  backend-python-audit:
    name: Python Audit (backend)
    needs: [ changes ]
    if: needs.changes.outputs.run-backend-python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python tooling
        uses: ./.github/actions/setup-python-just
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-cache-dependency-glob: backend/uv.lock

      - name: Install dependencies
        run: just backend/install

      - name: Run dependency audit
        run: just backend/audit

  docs-python-audit:
    name: Python Audit (docs)
    needs: [ changes ]
    if: needs.changes.outputs.run-docs-python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python tooling
        uses: ./.github/actions/setup-python-just
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-cache-dependency-glob: docs/uv.lock

      - name: Install dependencies
        run: just docs/install

      - name: Run dependency audit
        run: |
          set -o pipefail
          output="$(just docs/audit 2>&1)"
          status=$?
          printf '%s\n' "$output"
          if [ "$status" -ne 0 ]; then
            exit "$status"
          fi

          if printf '%s\n' "$output" | grep -Eq '^Found [1-9][0-9]* known vulnerability|^Vulnerabilities:'; then
            echo "::warning title=Docs dependency audit::Vulnerabilities were found in docs dependencies. Review the audit output above."
            {
              printf '### Docs dependency audit\n\n'
              printf 'Warning: vulnerabilities were found in docs dependencies.\n\n'
              printf 'This check is intentionally non-blocking so the pull request can still be merged.\n\n'
              printf 'Review the audit output in the step log above.\n'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  frontend-app-node-audit:
    name: Node Audit (frontend-app)
    needs: [ changes ]
    if: needs.changes.outputs.run-frontend-app-node == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node tooling
        uses: ./.github/actions/setup-node-just
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend-app/pnpm-lock.yaml

      - name: Install dependencies
        run: just frontend-app/install

      - name: Run dependency audit
        run: just frontend-app/audit

  frontend-web-node-audit:
    name: Node Audit (frontend-web)
    needs: [ changes ]
    if: needs.changes.outputs.run-frontend-web-node == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node tooling
        uses: ./.github/actions/setup-node-just
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend-web/pnpm-lock.yaml

      - name: Install dependencies
        run: just frontend-web/install

      - name: Run dependency audit
        run: just frontend-web/audit
