# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# spell-checker: ignore aquasecurity, esac, gacts, ossf, sarif, SARIF

name: Security

on:
  branch_protection_rule:
  schedule:
    - cron: "0 2 * * 1"
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  changes:
    name: Detect Changes
    if: github.event_name != 'branch_protection_rule'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run-container-images: ${{ steps.decide.outputs.run-container-images }}
      container-security-matrix: ${{ steps.decide.outputs.container-security-matrix }}
      run-iac: ${{ steps.decide.outputs.run-iac }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Detect changes
        id: detect
        uses: ./.github/actions/detect-changes

      - name: Decide which security jobs should run
        id: decide
        shell: bash
        env:
          IS_SCHEDULE: ${{ steps.detect.outputs.is-schedule }}
          IS_DISPATCH: ${{ steps.detect.outputs.is-dispatch }}
          SHARED: ${{ steps.detect.outputs.shared }}
          BACKEND: ${{ steps.detect.outputs.backend }}
          DOCS: ${{ steps.detect.outputs.docs }}
          APP: ${{ steps.detect.outputs.app }}
          WWW: ${{ steps.detect.outputs.www }}
          CONTAINERS: ${{ steps.detect.outputs.containers }}
        run: |
          # Scheduled or manual runs scan every runtime image and emit SBOMs.
          if [[ "$IS_SCHEDULE" == "true" || "$IS_DISPATCH" == "true" ]]; then
            SHARED=true
          fi

          shared_trigger=$([[ "$SHARED" == "true" || "$CONTAINERS" == "true" ]] && echo true || echo false)
          echo "run-iac=$shared_trigger" >> "$GITHUB_OUTPUT"

          include_entries=()
          [[ "$shared_trigger" == "true" || "$BACKEND" == "true" ]] && \
            include_entries+=('{"service":"api","context":"./backend","dockerfile":"./backend/Dockerfile","image_ref":"relab-backend:${{ github.sha }}"}')
          [[ "$shared_trigger" == "true" || "$BACKEND" == "true" ]] && \
            include_entries+=('{"service":"migrator","context":"./backend","dockerfile":"./backend/Dockerfile.migrations","image_ref":"relab-backend-migrations:${{ github.sha }}"}')
          [[ "$shared_trigger" == "true" || "$BACKEND" == "true" ]] && \
            include_entries+=('{"service":"relab-backup","context":"./backend","dockerfile":"./backend/Dockerfile.backups","image_ref":"relab-backup:${{ github.sha }}"}')
          [[ "$shared_trigger" == "true" || "$DOCS" == "true" ]] && \
            include_entries+=('{"service":"docs","context":"./docs","dockerfile":"./docs/Dockerfile","image_ref":"relab-docs:${{ github.sha }}"}')
          [[ "$shared_trigger" == "true" || "$APP" == "true" ]] && \
            include_entries+=('{"service":"app","context":"./app","dockerfile":"./app/Dockerfile","image_ref":"relab-app:${{ github.sha }}"}')
          [[ "$shared_trigger" == "true" || "$WWW" == "true" ]] && \
            include_entries+=('{"service":"www","context":"./www","dockerfile":"./www/Dockerfile","image_ref":"relab-www:${{ github.sha }}"}')

          if ((${#include_entries[@]} == 0)); then
            echo "run-container-images=false" >> "$GITHUB_OUTPUT"
            echo 'container-security-matrix={"include":[]}' >> "$GITHUB_OUTPUT"
          else
            matrix_json=$(printf '%s\n' "${include_entries[@]}" | paste -sd, -)
            echo "run-container-images=true" >> "$GITHUB_OUTPUT"
            echo "container-security-matrix={\"include\":[${matrix_json}]}" >> "$GITHUB_OUTPUT"
          fi

  secret-scan:
    name: Secret Scan
    if: github.event_name != 'branch_protection_rule'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run gitleaks
        uses: gacts/gitleaks@c9a0338361dc45a01aa7ebaaa5330179f3c62873
        with:
          version: 8.30.1
        env:
          GITLEAKS_CONFIG: .github/gitleaks.toml

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Review dependency changes
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48
        with:
          fail-on-severity: moderate

  container-security:
    name: Container Security (${{ matrix.service }})
    needs: [ changes ]
    if: needs.changes.outputs.run-container-images == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.changes.outputs.container-security-matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Build image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          load: true
          pull: true
          tags: ${{ matrix.image_ref }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ matrix.image_ref }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          trivyignores: .github/trivyignore.yaml

      - name: Generate SBOM
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ matrix.image_ref }}
          format: spdx-json
          output: sbom-${{ matrix.service }}.spdx.json
          skip-setup-trivy: true

      - name: Archive container security artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: security-${{ matrix.service }}-artifacts
          path: sbom-${{ matrix.service }}.spdx.json
          retention-days: 90

  trivy-iac:
    name: Trivy IaC
    needs: [ changes ]
    if: github.event_name != 'branch_protection_rule' && needs.changes.outputs.run-iac == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Scan IaC with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-iac.sarif
          exit-code: "1"
          severity: HIGH,CRITICAL
          trivyignores: .github/trivyignore.yaml
          skip-dirs: .venv,backend/.venv,node_modules,app/node_modules,docs/node_modules,www/node_modules

      - name: Upload Trivy IaC SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@b25d0ebf40e5b63ee81e1bd6e5d2a12b7c2aeb61
        with:
          sarif_file: trivy-iac.sarif

  codeql:
    name: CodeQL (${{ matrix.language }})
    if: github.event_name != 'branch_protection_rule'
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    timeout-minutes: 30
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@b25d0ebf40e5b63ee81e1bd6e5d2a12b7c2aeb61
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ./.github/codeql-config.yml

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@b25d0ebf40e5b63ee81e1bd6e5d2a12b7c2aeb61
        with:
          category: "/language:${{ matrix.language }}"

  scorecard:
    name: Scorecard
    if: github.event_name == 'branch_protection_rule' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      checks: read
      contents: read
      id-token: write
      issues: read
      pull-requests: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@99c09fe975337306107572b4fdf4db224cf8e2f2
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@b25d0ebf40e5b63ee81e1bd6e5d2a12b7c2aeb61
        with:
          sarif_file: results.sarif

  security-result:
    name: Security Result
    # Keep blocking jobs in sync between `needs` and the JSON passed to
    # check-required-jobs; skipped jobs are accepted, failed/cancelled jobs fail.
    if: always()
    needs:
      - changes
      - secret-scan
      - dependency-review
      - container-security
      - trivy-iac
      - codeql
      - scorecard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Check security jobs
        uses: ./.github/actions/check-required-jobs
        with:
          results: >-
            {
              "changes": "${{ needs.changes.result }}",
              "secret-scan": "${{ needs.secret-scan.result }}",
              "dependency-review": "${{ needs.dependency-review.result }}",
              "container-security": "${{ needs.container-security.result }}",
              "trivy-iac": "${{ needs.trivy-iac.result }}",
              "codeql": "${{ needs.codeql.result }}",
              "scorecard": "${{ needs.scorecard.result }}"
            }
