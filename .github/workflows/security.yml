name: Security

on:
  schedule:
    - cron: "0 3 * * 1"
    - cron: "30 2 * * 0"
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

env:
  PYTHON_VERSION: "3.14"
  NODE_VERSION: "22"

jobs:
  secret-scan:
    name: Secret Scan
    if: github.event_name != 'merge_group'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.28.0/gitleaks_8.28.0_linux_x64.tar.gz \
            | tar -xz gitleaks
          chmod +x gitleaks

      - name: Run gitleaks
        run: ./gitleaks git --verbose --redact .

  python-audit-root:
    name: Python Audit (root)
    if: github.event_name != 'merge_group'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python tooling
        uses: ./.github/actions/setup-python-just
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-cache-dependency-glob: uv.lock

      - name: Install root dependencies
        run: uv sync

      - name: Run root dependency audit
        run: just audit-root

  python-audit:
    name: Python Audit (${{ matrix.project }})
    if: github.event_name != 'merge_group'
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.non_blocking }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: backend
            non_blocking: false
          - project: docs
            non_blocking: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python tooling
        uses: ./.github/actions/setup-python-just
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-cache-dependency-glob: ${{ matrix.project }}/uv.lock

      - name: Install dependencies
        run: just ${{ matrix.project }}/install

      - name: Run dependency audit
        run: just ${{ matrix.project }}/audit

  node-audit:
    name: Node Audit (${{ matrix.project }})
    if: github.event_name != 'merge_group'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [frontend-app, frontend-web]
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node tooling
        uses: ./.github/actions/setup-node-just
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: Install dependencies
        run: just ${{ matrix.project }}/install

      - name: Run dependency audit
        run: just ${{ matrix.project }}/audit
