# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# spell-checker: ignore anchore, aquasecurity, gacts

name: Security

on:
  schedule:
    - cron: "0 2 * * 1"
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

defaults:
  run:
    shell: bash

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run-root-python: ${{ steps.decide.outputs.run-root-python }}
      run-backend-python: ${{ steps.decide.outputs.run-backend-python }}
      run-docs-node: ${{ steps.decide.outputs.run-docs-node }}
      run-frontend-app-node: ${{ steps.decide.outputs.run-frontend-app-node }}
      run-frontend-web-node: ${{ steps.decide.outputs.run-frontend-web-node }}
      run-container-images: ${{ steps.decide.outputs.run-container-images }}
      container-security-matrix: ${{ steps.decide.outputs.container-security-matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Detect changes
        id: detect
        uses: ./.github/actions/detect-changes

      - name: Decide which security jobs should run
        id: decide
        shell: bash
        env:
          IS_SCHEDULE: ${{ steps.detect.outputs.is-schedule }}
          IS_DISPATCH: ${{ steps.detect.outputs.is-dispatch }}
          IS_RENOVATE_PR: ${{ steps.detect.outputs.is-renovate-pr }}
          SHARED: ${{ steps.detect.outputs.shared }}
          ROOT_PYTHON: ${{ steps.detect.outputs.root-python }}
          BACKEND: ${{ steps.detect.outputs.backend }}
          DOCS: ${{ steps.detect.outputs.docs }}
          FRONTEND_APP: ${{ steps.detect.outputs.frontend-app }}
          FRONTEND_WEB: ${{ steps.detect.outputs.frontend-web }}
          CONTAINERS: ${{ steps.detect.outputs.containers }}
        run: |
          matrix_all='{"include":[
            {"service":"api","context":"./backend","dockerfile":"./backend/Dockerfile","image_ref":"relab/api:${{ github.sha }}"},
            {"service":"docs-site","context":"./docs","dockerfile":"./docs/Dockerfile","image_ref":"relab/docs-site:${{ github.sha }}"},
            {"service":"app-site","context":"./frontend-app","dockerfile":"./frontend-app/Dockerfile","image_ref":"relab/app-site:${{ github.sha }}"},
            {"service":"web-site","context":"./frontend-web","dockerfile":"./frontend-web/Dockerfile","image_ref":"relab/web-site:${{ github.sha }}"}
          ]}'

          # Scheduled or manual runs exercise every audit + scan every image.
          if [[ "$IS_SCHEDULE" == "true" || "$IS_DISPATCH" == "true" ]]; then
            for k in run-root-python run-backend-python run-docs-node run-frontend-app-node run-frontend-web-node run-container-images; do
              echo "$k=true" >> "$GITHUB_OUTPUT"
            done
            echo "container-security-matrix=$matrix_all" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "run-root-python=$([[ "$SHARED" == "true" || "$ROOT_PYTHON" == "true" ]] && echo true || echo false)"
            echo "run-backend-python=$([[ "$SHARED" == "true" || "$BACKEND" == "true" ]] && echo true || echo false)"
            echo "run-docs-node=$([[ "$SHARED" == "true" || "$DOCS" == "true" ]] && echo true || echo false)"
            echo "run-frontend-app-node=$([[ "$SHARED" == "true" || "$FRONTEND_APP" == "true" ]] && echo true || echo false)"
            echo "run-frontend-web-node=$([[ "$SHARED" == "true" || "$FRONTEND_WEB" == "true" ]] && echo true || echo false)"
          } >> "$GITHUB_OUTPUT"

          # Renovate PRs touch runtime tooling, not service source — skip container rebuilds on those PRs.
          if [[ "$IS_RENOVATE_PR" == "true" ]]; then
            BACKEND=false
            DOCS=false
            FRONTEND_APP=false
            FRONTEND_WEB=false
          fi

          shared_trigger=$([[ "$SHARED" == "true" || "$CONTAINERS" == "true" ]] && echo true || echo false)

          include_entries=()
          [[ "$shared_trigger" == "true" || "$BACKEND" == "true" ]] && \
            include_entries+=('{"service":"api","context":"./backend","dockerfile":"./backend/Dockerfile","image_ref":"relab/api:${{ github.sha }}"}')
          [[ "$shared_trigger" == "true" || "$DOCS" == "true" ]] && \
            include_entries+=('{"service":"docs-site","context":"./docs","dockerfile":"./docs/Dockerfile","image_ref":"relab/docs-site:${{ github.sha }}"}')
          [[ "$shared_trigger" == "true" || "$FRONTEND_APP" == "true" ]] && \
            include_entries+=('{"service":"app-site","context":"./frontend-app","dockerfile":"./frontend-app/Dockerfile","image_ref":"relab/app-site:${{ github.sha }}"}')
          [[ "$shared_trigger" == "true" || "$FRONTEND_WEB" == "true" ]] && \
            include_entries+=('{"service":"web-site","context":"./frontend-web","dockerfile":"./frontend-web/Dockerfile","image_ref":"relab/web-site:${{ github.sha }}"}')

          if ((${#include_entries[@]} == 0)); then
            echo "run-container-images=false" >> "$GITHUB_OUTPUT"
            echo 'container-security-matrix={"include":[]}' >> "$GITHUB_OUTPUT"
          else
            matrix_json=$(printf '%s\n' "${include_entries[@]}" | paste -sd, -)
            echo "run-container-images=true" >> "$GITHUB_OUTPUT"
            echo "container-security-matrix={\"include\":[${matrix_json}]}" >> "$GITHUB_OUTPUT"
          fi

  secret-scan:
    name: Secret Scan
    if: github.event_name != 'merge_group' && (github.event_name != 'pull_request' || github.event.pull_request.user.login != 'renovate[bot]')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gacts/gitleaks@c9a0338361dc45a01aa7ebaaa5330179f3c62873
        with:
          version: 8.30.1
        env:
          GITLEAKS_CONFIG: .github/gitleaks.toml

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate

  python-audit-root:
    name: Python Audit (root)
    needs: [ changes ]
    if: github.event_name != 'pull_request' && needs.changes.outputs.run-root-python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up runtime
        uses: ./.github/actions/setup-runtime
        with:
          setup-python: "true"
          uv-cache-dependency-glob: uv.lock

      - name: Install root dependencies
        run: uv sync --frozen

      - name: Run root dependency audit
        run: just audit-root

  backend-python-audit:
    name: Python Audit (backend)
    needs: [ changes ]
    if: github.event_name != 'pull_request' && needs.changes.outputs.run-backend-python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up runtime
        uses: ./.github/actions/setup-runtime
        with:
          setup-python: "true"
          uv-cache-dependency-glob: backend/uv.lock

      - name: Install dependencies
        run: just backend/install

      - name: Run dependency audit
        run: just backend/audit

  docs-node-audit:
    name: Node Audit (docs)
    needs: [ changes ]
    if: github.event_name != 'pull_request' && needs.changes.outputs.run-docs-node == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up runtime
        uses: ./.github/actions/setup-runtime
        with:
          setup-node: "true"
          cache-dependency-path: docs/pnpm-lock.yaml

      - name: Install dependencies
        run: just docs/install

      - name: Run dependency audit
        run: |
          set -o pipefail
          output="$(just docs/audit 2>&1)"
          status=$?
          printf '%s\n' "$output"
          if [ "$status" -ne 0 ]; then
            exit "$status"
          fi

          if printf '%s\n' "$output" | grep -Eq '^Found [1-9][0-9]* known vulnerability|^Vulnerabilities:'; then
            echo "::warning title=Docs dependency audit::Vulnerabilities were found in docs dependencies. Review the audit output above."
            {
              printf '### Docs dependency audit\n\n'
              printf 'Warning: vulnerabilities were found in docs dependencies.\n\n'
              printf 'This check is intentionally non-blocking so the pull request can still be merged.\n\n'
              printf 'Review the audit output in the step log above.\n'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  frontend-app-node-audit:
    name: Node Audit (frontend-app)
    needs: [ changes ]
    if: github.event_name != 'pull_request' && needs.changes.outputs.run-frontend-app-node == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up runtime
        uses: ./.github/actions/setup-runtime
        with:
          setup-node: "true"
          cache-dependency-path: frontend-app/pnpm-lock.yaml

      - name: Install dependencies
        run: just frontend-app/install

      - name: Run dependency audit
        run: just frontend-app/audit

  frontend-web-node-audit:
    name: Node Audit (frontend-web)
    needs: [ changes ]
    if: github.event_name != 'pull_request' && needs.changes.outputs.run-frontend-web-node == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up runtime
        uses: ./.github/actions/setup-runtime
        with:
          setup-node: "true"
          cache-dependency-path: frontend-web/pnpm-lock.yaml

      - name: Install dependencies
        run: just frontend-web/install

      - name: Run dependency audit
        run: just frontend-web/audit

  container-security:
    name: Container Security (${{ matrix.service }})
    needs: [ changes ]
    if: needs.changes.outputs.run-container-images == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.user.login != 'renovate[bot]')
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.changes.outputs.container-security-matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Build image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          load: true
          pull: true
          tags: ${{ matrix.image_ref }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@1f0aa582c8c8f5f7639610d6d38baddfea4fdcee
        with:
          image-ref: ${{ matrix.image_ref }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          trivyignores: .github/trivyignore

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          image: ${{ matrix.image_ref }}
          format: spdx-json
          output-file: sbom-${{ matrix.service }}.spdx.json

      - name: Archive container security artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: security-${{ matrix.service }}-artifacts
          path: sbom-${{ matrix.service }}.spdx.json
          retention-days: 14

  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    timeout-minutes: 30
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ./.github/codeql-config.yml

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
