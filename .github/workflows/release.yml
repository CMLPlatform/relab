# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# spell-checker: ignore aquasecurity
name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

  release-sboms:
    name: Release SBOM (${{ matrix.service }})
    needs: [ release-please ]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      attestations: write
      contents: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            context: ./backend
            dockerfile: ./backend/Dockerfile
            image_ref: relab-backend:${{ github.sha }}
          - service: migrator
            context: ./backend
            dockerfile: ./backend/Dockerfile.migrations
            image_ref: relab-backend-migrations:${{ github.sha }}
          - service: relab-backup
            context: ./backend
            dockerfile: ./backend/Dockerfile.backups
            image_ref: relab-backup:${{ github.sha }}
          - service: docs
            context: ./docs
            dockerfile: ./docs/Dockerfile
            image_ref: relab-docs:${{ github.sha }}
          - service: app
            context: ./app
            dockerfile: ./app/Dockerfile
            image_ref: relab-app:${{ github.sha }}
          - service: www
            context: ./www
            dockerfile: ./www/Dockerfile
            image_ref: relab-www:${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Build image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          load: true
          pull: true
          tags: ${{ matrix.image_ref }}

      - name: Generate SPDX SBOM
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ matrix.image_ref }}
          format: spdx-json
          output: sbom-${{ matrix.service }}.spdx.json

      - name: Attest SBOM asset provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: sbom-${{ matrix.service }}.spdx.json

      - name: Upload SBOM to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: gh release upload "$TAG_NAME" "sbom-${{ matrix.service }}.spdx.json" --clobber
