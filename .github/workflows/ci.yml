# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
  # Scheduled runs only exercise docker-smoke (change detection skips all other jobs).
  schedule:
    - cron: "0 3 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  PYTHON_VERSION: "3.14"
  NODE_VERSION: "22"

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run-policy: ${{ steps.detect.outputs.run-policy }}
      run-backend: ${{ steps.detect.outputs.run-backend }}
      run-frontend-web: ${{ steps.detect.outputs.run-frontend-web }}
      run-frontend-app: ${{ steps.detect.outputs.run-frontend-app }}
      run-docs: ${{ steps.detect.outputs.run-docs }}
      run-e2e: ${{ steps.detect.outputs.run-e2e }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect changes
        id: detect
        uses: ./.github/actions/detect-ci-changes

  policy:
    name: Repository Policy
    needs: [ changes ]
    if: needs.changes.outputs.run-policy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python tooling
        uses: ./.github/actions/setup-python-just
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-cache-dependency-glob: |
            pyproject.toml
            backend/uv.lock
            docs/uv.lock

      - name: Install root tooling
        run: uv sync

      - name: Run repository policy checks
        run: just check-root

  backend:
    name: Backend
    needs: [ changes ]
    if: needs.changes.outputs.run-backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python tooling
        uses: ./.github/actions/setup-python-just
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-cache-dependency-glob: backend/uv.lock

      - name: Install dependencies
        run: just backend/install

      - name: Run checks
        run: just backend/check

      - name: Run test suite
        run: just backend/test-ci

      - name: Upload coverage
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: ./.github/actions/upload-codecov
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./backend/reports/coverage/coverage.xml
          flags: backend
          name: backend-coverage

      - name: Archive reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage-artifacts
          path: |
            backend/reports/coverage/html/
            backend/reports/coverage/coverage.xml
          retention-days: 7

  frontend-web:
    name: Frontend Web
    needs: [ changes ]
    if: needs.changes.outputs.run-frontend-web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node tooling
        uses: ./.github/actions/setup-node-just
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache-dependency-path: frontend-web/package-lock.json

      - name: Install dependencies
        run: just frontend-web/install

      - name: Run checks
        run: just frontend-web/check

      - name: Run test suite
        run: just frontend-web/test-ci

      - name: Upload coverage
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: ./.github/actions/upload-codecov
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./frontend-web/coverage/lcov.info
          flags: frontend-web
          name: frontend-web-coverage
          disable-search: "true"

      - name: Archive coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-web-coverage-artifacts
          path: frontend-web/coverage/
          retention-days: 7

      - name: Build app
        run: just frontend-web/build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox
        working-directory: frontend-web

      - name: Run browser E2E tests
        run: just frontend-web/test-e2e-browser

      - name: Archive Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-web-playwright-artifacts
          path: frontend-web/playwright-report/
          retention-days: 7

  frontend-app:
    name: Frontend App
    needs: [ changes ]
    if: needs.changes.outputs.run-frontend-app == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node tooling
        uses: ./.github/actions/setup-node-just
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache-dependency-path: frontend-app/package-lock.json

      - name: Install dependencies
        run: just frontend-app/install

      - name: Run checks
        run: just frontend-app/check

      - name: Run test suite
        run: just frontend-app/test-ci

      - name: Upload coverage
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: ./.github/actions/upload-codecov
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./frontend-app/coverage/lcov.info
          flags: frontend-app
          name: frontend-app-coverage
          disable-search: "true"

      - name: Archive coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-app-coverage-artifacts
          path: frontend-app/coverage/
          retention-days: 7

  docs:
    name: Docs
    needs: [ changes ]
    if: needs.changes.outputs.run-docs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python tooling
        uses: ./.github/actions/setup-python-just
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          uv-cache-dependency-glob: docs/uv.lock

      - name: Install dependencies
        run: just docs/install

      - name: Run docs CI
        run: just docs/ci

  docker-smoke:
    name: Docker Smoke (${{ matrix.recipe }})
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        recipe:
          - docker-smoke-backend
          - docker-orchestration-smoke
          - docker-smoke-frontend-web
          - docker-smoke-frontend-app
          - docker-smoke-docs
          - docker-smoke-user-upload-backups
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Run smoke test
        run: just ${{ matrix.recipe }}

  e2e-full-stack:
    name: Frontend App Full-Stack E2E
    needs: [ changes ]
    if: needs.changes.outputs.run-e2e == 'true' && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      E2E_BACKEND_PORT: "18432"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up Node tooling
        uses: ./.github/actions/setup-node-just
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache-dependency-path: frontend-app/package-lock.json

      - name: Install frontend-app dependencies
        run: just frontend-app/install

      - name: Build Expo web app for local E2E backend
        run: just frontend-app/build-web

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend-app

      - name: Run full-stack E2E tests
        run: just test-e2e-full-stack

      - name: Archive Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-app-playwright-artifacts
          path: frontend-app/playwright-report/
          retention-days: 7
