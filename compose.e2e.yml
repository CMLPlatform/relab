# compose.e2e.yml (END-TO-END TESTING, used for testing the full stack in CI)
#
# To start the environment:
#  just e2e-backend-up
#
# Then build and test the Expo web app against the local backend:
#  just frontend-app/build-web
#  just frontend-app/test-e2e
#
# To stop and remove the environment:
#  just e2e-backend-down
#
# Frontends are intentionally NOT included here. They are built and served
# on the host, so that Playwright runs on the host and can freely reach the
# backend service on localhost.

name: relab_e2e

services:
  backend:
    build:
      context: ./backend
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy
    env_file: ./backend/.env.test
    environment:
      DATABASE_HOST: database
      REDIS_HOST: cache
    ports:
      - "${E2E_BACKEND_PORT:-18432}:8000"
    volumes: # To ensure that the backend has access to user uploads (for testing upload functionality with real files)
      - user_uploads:/opt/relab/backend/data/uploads
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=5).status == 200 else 1)",
        ]
      interval: 10s
      timeout: 5s
      start_period: 30s
      start_interval: 5s
      retries: 6

  backend-migrations:
    build:
      context: ./backend
      dockerfile: Dockerfile.migrations
      cache_from:
        - type=gha
      cache_to:
        - type=gha,mode=max
    depends_on:
      database:
        condition: service_healthy
    env_file: ./backend/.env.test
    environment:
      DATABASE_HOST: database
      REDIS_HOST: cache
      # SEED_DUMMY_DATA is enabled for the migrations service in the E2E environment, to ensure that the database is seeded with realistic test data (including example images) before running tests.
      SEED_DUMMY_DATA: True
    volumes: # Ensure migrations have access to user uploads (for seeding example images)
      - user_uploads:/opt/relab/backend-migrations/data/uploads
    restart: on-failure:3

  cache:
    image: redis:8-alpine@sha256:81b6f81d6a6c5b9019231a2e8eb10085e3a139a34f833dcc965a8a959b040b72
    # No password for test environment: simplifies healthcheck and connection strings
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      start_period: 5s
      start_interval: 5s
      retries: 5

  database:
    image: postgres:18-alpine@sha256:4da1a4828be12604092fa55311276f08f9224a74a62dcb4708bd7439e2a03911
    env_file: ./backend/.env.test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U postgres -d relab_e2e_db"]
      interval: 10s
      timeout: 5s
      start_period: 5s
      start_interval: 5s
      retries: 5

volumes:
  user_uploads:
