# compose.ci.yml (CI environment, used for testing individual services in CI)
# Provides credentials via .env.test so services can start without real secrets.
name: relab_ci

services:
  backend:
    environment:
      ENVIRONMENT: testing
    env_file: ./backend/.env.test

  backend-migrations:
    env_file: ./backend/.env.test

  database:
    env_file: ./backend/.env.test

  cache:
    env_file: ./backend/.env.test

  frontend-app:
    build:
      args:
        BUILD_MODE: test

  frontend-web:
    build:
      args:
        BUILD_MODE: test
