# RELab runtime secret inventory.
#
# This provider-neutral contract leaves a clean path for a later external
# manager such as Infisical to sync runtime secrets into host files.

[env_policy]
runtime_secret_files = [
  "postgres_password",
  "database_app_password",
  "database_migration_password",
  "database_backup_password",
  "redis_password",
  "restic_password",
  "auth_token_secret",
  "oauth_state_secret",
  "cache_signing_secret",
  "data_encryption_key",
  "google_oauth_client_secret",
  "github_oauth_client_secret",
  "smtp_password",
  "microsoft_graph_client_secret",
  "bootstrap_superuser_password",
]

infisical_path_template = "/relab/{env}/{name}"
