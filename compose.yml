# docker-compose.yml (BASE - common configuration)
services:
  api:
    build:
      context: ./backend
      cache_from:
        - type=gha
      cache_to:
        - type=gha,mode=max
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_HOST: postgres # Point to the database service
      DATABASE_PORT: 5432
      REDIS_HOST: redis # Point to the cache service
    volumes:
      - user_uploads:/opt/relab/backend/data/uploads
    restart: unless-stopped

  migrator:
    build:
      context: ./backend
      dockerfile: Dockerfile.migrations
      args:
        # Taxonomy seeding pulls in pandas/openpyxl/requests; keep it opt-in.
        INCLUDE_TAXONOMY_SEED_DEPS: ${BACKEND_MIGRATIONS_INCLUDE_TAXONOMY_SEED_DEPS:-false}
      cache_from:
        - type=gha
      cache_to:
        - type=gha,mode=max
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_HOST: postgres
      REDIS_HOST: redis
      DEBUG: ${DEBUG:-false}
      SEED_DUMMY_DATA: ${SEED_DUMMY_DATA:-false}
      SEED_CPV_CATEGORIES: ${SEED_CPV_CATEGORIES:-false}
      SEED_CPV_PRODUCT_TYPES: ${SEED_CPV_PRODUCT_TYPES:-false}
      SEED_HS_CATEGORIES: ${SEED_HS_CATEGORIES:-false}
    volumes:
      # Ensure migrations have access to user uploads (for seeding example images)
      - user_uploads:/opt/relab/backend-migrations/data/uploads
    profiles:
      - migrations
    restart: on-failure:3

  redis:
    image: redis:8-alpine@sha256:81b6f81d6a6c5b9019231a2e8eb10085e3a139a34f833dcc965a8a959b040b72
    command: [ "sh", "-c", "redis-server --appendonly yes --save 60 1 $${REDIS_PASSWORD:+--requirepass $${REDIS_PASSWORD}}" ] # spell-checker: ignore requirepass
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli $${REDIS_PASSWORD:+-a $${REDIS_PASSWORD}} ping | grep -q PONG" ]
      interval: 30s
      timeout: 5s
      start_period: 5s
      start_interval: 5s
      retries: 3
    restart: unless-stopped

  postgres:
    image: postgres:18
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -h localhost -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 30s
      timeout: 5s
      start_period: 5s
      start_interval: 5s
      retries: 3
    volumes:
      - database_data:/var/lib/postgresql
    restart: unless-stopped

  docs-site:
    build:
      context: ./docs
      cache_from:
        - type=gha
      cache_to:
        - type=gha,mode=max
    environment:
      GOMAXPROCS: "1"
    restart: unless-stopped

  app-site:
    build:
      context: ./frontend-app
      cache_from:
        - type=gha
      cache_to:
        - type=gha,mode=max
    environment:
      GOMAXPROCS: "1"
    restart: unless-stopped

  web-site:
    build:
      context: ./frontend-web
      cache_from:
        - type=gha
      cache_to:
        - type=gha,mode=max
    environment:
      GOMAXPROCS: "1"
    restart: unless-stopped

volumes:
  database_data:
  user_uploads:
