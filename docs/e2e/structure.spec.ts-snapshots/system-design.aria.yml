  - heading "Monorepo structure" [level=2]
  - link "Section titled “Monorepo structure”":
    - /url: "#monorepo-structure"
  - list:
    - listitem:
      - code: backend/
      - text: ": main API, persistence, auth, file handling, and plugin integration"
    - listitem:
