    - listitem:
      - code: docs/
      - text: ": documentation site"
    - listitem: Compose files at the repository root coordinate local and deployed multi-service setups
  - heading "Technology Choices" [level=2]
  - link "Section titled “Technology Choices”":
    - /url: "#technology-choices"
  - list:
    - listitem:
      - strong: Backend API
      - text: ": FastAPI"
    - listitem:
      - strong: Persistence layer
      - text: ": SQLAlchemy 2.0 + Pydantic"
    - listitem:
      - strong: Database
      - text: ": PostgreSQL"
    - listitem:
      - strong: Migrations
      - text: ": Alembic"
    - listitem:
      - strong: Caching and token infrastructure
      - text: ": Redis"
    - listitem:
      - strong: Research app frontend
      - text: ": Expo / React Native"
    - listitem:
      - strong: Public web frontend
      - text: ": Astro"
    - listitem:
      - strong: Docs site
      - text: ": Astro Starlight"
  - paragraph: These choices keep the stack relatively small and understandable, while still supporting public access, API interoperability, and later AI-assisted workflows.
  - heading "Backend Domain Structure" [level=2]
  - link "Section titled “Backend Domain Structure”":
    - /url: "#backend-domain-structure"
  - paragraph: "The backend is organised mainly by domain rather than by HTTP verb alone:"
  - figure "Terminal window":
    - text: ""
    - region:
      - code: "app/ ├── api/ │ ├── auth/ # Login, registration, OAuth, users, organizations │ ├── background_data/ # Taxonomies, categories, materials, product types, units │ ├── data_collection/ # Products, components, search, related properties │ ├── file_storage/ # Uploaded files, images, linked media records │ ├── newsletter/ # Newsletter subscription flows │ ├── plugins/ # Optional integrations such as rpi_cam │ └── common/ # Shared routers, helpers, exceptions ├── core/ # Runtime configuration, DB, cache, logging, HTTP clients ├── static/ # Static assets served by the backend └── templates/ # Email and HTML templates"
    - button "Copy to clipboard"
  - heading "Runtime Behavior" [level=2]
  - link "Section titled “Runtime Behavior”":
    - /url: "#runtime-behavior"
  - paragraph: "At startup the backend:"
  - list:
    - listitem: validates security-sensitive configuration
    - listitem: initializes Redis and API caching
    - listitem: creates storage directories for uploads
    - listitem: mounts static and upload-backed routes
    - listitem: prepares shared outbound HTTP clients
    - listitem: starts background cleanup infrastructure
  - heading "Design Priorities" [level=2]
  - link "Section titled “Design Priorities”":
    - /url: "#design-priorities"
  - list:
    - listitem: keep the data model explicit and inspectable
    - listitem: support authenticated data entry from a dedicated app
    - listitem: allow public and private API surfaces to coexist
    - listitem: preserve a path toward dataset publication and external reuse
    - listitem: support FAIR-style reuse through open interfaces and documented structure
    - listitem: keep the data model suitable for later benchmarking and AI-assisted enrichment
    - listitem: avoid unnecessary infrastructure complexity for a PhD-scale project
