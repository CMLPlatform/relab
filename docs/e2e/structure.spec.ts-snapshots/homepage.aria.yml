- main:
  - heading "Reverse Engineering Lab" [level=1]
  - paragraph:
    - text: RELab is a research platform for collecting and publicly viewing data on the disassembly of durable goods, developed by the
    - link "Institute of Environmental Sciences (CML)":
      - /url: https://www.universiteitleiden.nl/en/science/environmental-sciences
    - text: at Leiden University. It supports structured data collection, media capture, and later analysis of product composition, materials, and circularity.
  - paragraph:
    - link "DOI":
      - /url: https://doi.org/10.5281/zenodo.16637742
      - img "DOI"
    - link "Coverage":
      - /url: https://codecov.io/gh/CMLPlatform/relab
      - img "Coverage"
    - link "OpenSSF Scorecard":
      - /url: https://scorecard.dev/viewer/?uri=github.com/CMLPlatform/relab
      - img "OpenSSF Scorecard"
    - link "Deployed":
      - /url: https://cml-relab.org
      - img "Deployed"
  - heading "Start here" [level=2]
  - link "Section titled “Start here”":
    - /url: "#start-here"
  - list:
    - listitem:
      - paragraph:
        - strong:
          - link "Getting started":
            - /url: user-guides/getting-started/
        - text: Create an account and document a first product without overthinking the model.
    - listitem:
      - paragraph:
        - strong:
          - link "Guides":
            - /url: user-guides/
        - text: Practical help for data collection, hardware, camera capture, and API access.
    - listitem:
      - paragraph:
        - strong:
          - link "Architecture":
            - /url: architecture/
        - text: How the platform is built, how it runs, and where the main boundaries are.
    - listitem:
      - paragraph:
        - strong:
          - link "Project context":
            - /url: project/
        - text: Why RELab exists, who it is for, and where the dataset work is heading.
  - heading "Quick links" [level=2]
  - link "Section titled “Quick links”":
    - /url: "#quick-links"
  - list:
    - listitem:
      - link "Open the platform":
        - /url: https://app.cml-relab.org
    - listitem:
      - link "Open the API docs":
        - /url: https://api.cml-relab.org/docs
    - listitem:
      - link "View the repository":
        - /url: https://github.com/CMLPlatform/relab
  - heading "Research motivation" [level=2]
  - link "Section titled “Research motivation”":
    - /url: "#research-motivation"
  - paragraph: "Good product data is still surprisingly hard to get: what something is made of, how it comes apart, which parts matter, and what evidence supports those claims. RELab takes a bottom-up approach. It helps people who handle real products document what they see, with enough structure that the records can later be compared, reused, and linked to other industrial-ecology data."
  - paragraph:
    - text: For repository entry points and self-hosting, see
