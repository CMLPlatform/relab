[project]
  # Site settings
  site_author      = "Simon van Lierde"
  site_description = "Documentation of the Reverse Engineering Lab data platform"
  site_name        = "Reverse Engineering Lab"
  site_url         = "https://docs.cml-relab.org"

  # NOTE: we use <year> as a placeholder for the current year, which is substituted in staging and production Docker builds
  copyright = "Copyright &copy; <year> CML, Leiden University"

  # Repository settings
  edit_uri  = "edit/main/docs/docs/"
  repo_name = "CMLPlatform/relab"
  repo_url  = "https://github.com/CMLPlatform/relab"

  # Navigation settings
  nav = [
    { Home = "index.md" },

    { Dataset = [
      { Overview = "dataset/index.md" },
    ] },

    { "Technical Architecture" = [
      { "System Design" = "architecture/system-design.md" },

      { "Database Schema" = "architecture/datamodel.md" },

      { "API Structure" = "architecture/api.md" },

      { "Authentication" = "architecture/auth.md" },

      { "RPI Camera Plugin" = "architecture/rpi-cam.md" },

      { "Deployment & Operations" = "architecture/deployment.md" },
    ] },

    { "User Guides" = [
      { "Getting Started" = "user-guides/getting-started.md" },

      { "API Documentation" = "user-guides/api.md" },

      { "Data Collection" = "user-guides/data-collection.md" },

      { "Raspberry Pi Camera Setup" = "user-guides/rpi-cam.md" },
    ] },

  ]

  [project.theme]
    variant = "modern"

    features = [
      "content.action.edit",
      "content.action.view",
      "content.code.annotate",
      "content.code.copy",
      "navigation.expand",
      "navigation.footer",
      "navigation.indexes",
      "navigation.instant",
      "navigation.instant.prefetch",
      "navigation.instant.progress",
      "navigation.path",
      "navigation.sections",
      "navigation.tabs",
      "navigation.tabs.sticky",
      "navigation.top",
      "navigation.tracking",
      "search.highlight",
      "search.suggest",
      "toc.follow",
    ]

    favicon   = "static/images/favicon.ico"
    icon.repo = "fontawesome/brands/github"
    logo      = "static/images/logo.png"

    # Palette toggle for automatic mode
    [[project.theme.palette]]
      accent      = "amber"
      media       = "(prefers-color-scheme)"
      primary     = "deep purple"
      toggle.icon = "lucide/sun-moon"
      toggle.name = "Switch to light mode"

    # Palette toggle for light mode
    [[project.theme.palette]]
      accent      = "amber"
      media       = "(prefers-color-scheme: light)"
      primary     = "deep purple"
      scheme      = "default"
      toggle.icon = "lucide/sun"
      toggle.name = "Switch to dark mode"

    # Palette toggle for dark mode
    [[project.theme.palette]]
      accent      = "amber"
      media       = "(prefers-color-scheme: dark)"
      primary     = "deep purple"
      scheme      = "slate"
      toggle.icon = "lucide/moon"
      toggle.name = "Switch to system preference"

  [project.extra]
    # Remove Zensical badge from footer
    generator = false

    [[project.extra.social]]
      icon = "fontawesome/brands/github"
      link = "https://github.com/CMLPlatform/relab"

    [[project.extra.social]]
      icon = "fontawesome/brands/linkedin"
      link = "https://www.linkedin.com/groups/15671021"
