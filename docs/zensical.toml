# Zensical configuration for the CML Reverse Engineering Lab documentation site.
# spell-checker: ignore pymdownx, superfences
[project]
  # Site settings
  site_author      = "Simon van Lierde"
  site_description = "Technical documentation for the Reverse Engineering Lab research platform"
  site_name        = "Reverse Engineering Lab"
  site_url         = "https://docs.cml-relab.org"

  # NOTE: we use <year> as a placeholder for the current year, which is substituted in staging and production Docker builds
  copyright = "Copyright &copy; <year> CML, Leiden University"

  # Repository settings
  edit_uri  = "edit/main/docs/docs/"
  repo_name = "CMLPlatform/relab"
  repo_url  = "https://github.com/CMLPlatform/relab"

  # Custom assets
  extra_css        = ["stylesheets/extra.css"]
  extra_javascript = ["javascripts/mermaid.mjs"]

  # Navigation settings
  nav = [
    { Home = "index.md" },

    { Project = [
      { Overview = "project/index.md" },
      { "Use Cases" = "project/use-cases.md" },
      { Roadmap = "project/roadmap.md" },
      { Dataset = "project/dataset.md" },
    ] },

    { Architecture = [
      { Overview = "architecture/index.md" },
      { "System Design" = "architecture/system-design.md" },
      { "Data Model" = "architecture/datamodel.md" },
      { "API Structure" = "architecture/api.md" },
      { "Authentication" = "architecture/auth.md" },
      { "RPI Camera Plugin" = "architecture/rpi-cam.md" },
      { "Deployment & Operations" = "architecture/deployment.md" },
      { "Engineering Ops" = "architecture/engineering-ops.md" },
      { "C4 Architecture Diagrams" = "architecture/c4-diagrams.md" },
    ] },

    { "User Guides" = [
      { Overview = "user-guides/index.md" },
      { "Getting Started" = "user-guides/getting-started.md" },
      { "Data Collection" = "user-guides/data-collection.md" },
      { Hardware = "user-guides/hardware.md" },
      { "RPI Camera" = "user-guides/rpi-cam.md" },
      { "API Interaction" = "user-guides/api.md" },
    ] },

  ]

  [project.theme]
    custom_dir = "overrides"
    variant    = "modern"

    features = [
      "content.action.edit",
      "content.action.view",
      "content.code.annotate",
      "content.code.copy",
      "content.tooltips",
      "navigation.expand",
      "navigation.footer",
      "navigation.indexes",
      "navigation.instant",
      "navigation.instant.prefetch",
      "navigation.instant.progress",
      "navigation.path",
      "navigation.sections",
      "navigation.tabs",
      "navigation.tabs.sticky",
      "navigation.top",
      "navigation.tracking",
      "search.highlight",
      "search.suggest",
      "toc.follow",
    ]

    favicon   = "static/images/favicon.ico"
    icon.repo = "fontawesome/brands/github"
    logo      = "static/images/logo.png"

    # Palette toggle for automatic mode
    [[project.theme.palette]]
      accent      = "amber"
      media       = "(prefers-color-scheme)"
      primary     = "teal"
      toggle.icon = "lucide/sun-moon"
      toggle.name = "Switch to light mode"

    # Palette toggle for light mode
    [[project.theme.palette]]
      accent      = "amber"
      media       = "(prefers-color-scheme: light)"
      primary     = "teal"
      scheme      = "default"
      toggle.icon = "lucide/sun"
      toggle.name = "Switch to dark mode"

    # Palette toggle for dark mode
    [[project.theme.palette]]
      accent      = "amber"
      media       = "(prefers-color-scheme: dark)"
      primary     = "teal"
      scheme      = "slate"
      toggle.icon = "lucide/moon"
      toggle.name = "Switch to system preference"

  [project.extra]
    # Remove Zensical badge from footer
    generator = false

    [[project.extra.social]]
      icon = "fontawesome/brands/github"
      link = "https://github.com/CMLPlatform/relab"

    [[project.extra.social]]
      icon = "fontawesome/brands/linkedin"
      link = "https://www.linkedin.com/groups/15671021"

  # ── Markdown extensions ─────────────────────────────────────────────────────
  [project.markdown_extensions.abbr]
  [project.markdown_extensions.admonition]
  [project.markdown_extensions.attr_list]
  [project.markdown_extensions.pymdownx.details]

  [project.markdown_extensions.pymdownx.emoji]
    emoji_generator = "zensical.extensions.emoji.to_svg"
    emoji_index     = "zensical.extensions.emoji.twemoji"

  [project.markdown_extensions.pymdownx.highlight]
    anchor_linenums = true
  # spell-checker: ignore inlinehilite
  [project.markdown_extensions.pymdownx.inlinehilite]
  [project.markdown_extensions.md_in_html]

  [project.markdown_extensions.pymdownx.snippets]
    auto_append = ["includes/abbreviations.md"]

  [project.markdown_extensions.pymdownx.superfences]
    custom_fences = [{ name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }]

  [project.markdown_extensions.pymdownx.tabbed]
    alternate_style = true

  [project.markdown_extensions.pymdownx.tasklist]
    custom_checkbox = true

  [project.markdown_extensions.toc]
    permalink = true
