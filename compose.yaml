# compose.yaml (BASE — common configuration shared by every environment)
#
# Overlays compose on top of this file:
#   - compose.dev.yaml    → local development (hot reload)
#   - compose.ci.yaml     → backend unit/integration tests in CI
#   - compose.e2e.yaml    → full-stack Playwright E2E
#   - compose.deploy.yaml → prod and staging (APP_ENV selects which)
#
# Profiles:
#   - migrations → one-shot `migrator` service (required on first start and after schema changes)
#   - backups    → encrypted PostgreSQL + upload restic backups (prod/staging only)
#
# Telemetry (logs/traces/metrics) on prod/staging is shipped to a central
# monitoring stack — see compose.deploy.yaml for the Loki log driver config
# and the OTEL_EXPORTER_OTLP_ENDPOINT env var wiring.

# --- Reusable fragments ------------------------------------------------------
# YAML anchors; consumed via `<<: *name`. No runtime effect on their own.

x-gha-build: &gha-build
  cache_from:
    - type=gha
  cache_to:
    - type=gha,mode=max

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 5s
  start_period: 20s
  start_interval: 5s
  retries: 3

services:
  api:
    build:
      context: ./backend
      <<: *gha-build
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - user_uploads:/opt/relab/backend/data/uploads
    environment:
      DATABASE_HOST: postgres # Point to the database service
      DATABASE_PORT: 5432
      REDIS_HOST: redis # Point to the cache service
    healthcheck:
      <<: *healthcheck-defaults
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/live', timeout=5)" ]
    networks:
      - edge
      - data

  migrator:
    build:
      context: ./backend
      dockerfile: Dockerfile.migrations
      args:
        # Taxonomy seeding pulls in pandas/openpyxl/requests; keep it opt-in.
        INCLUDE_TAXONOMY_SEED_DEPS: ${BACKEND_MIGRATIONS_INCLUDE_TAXONOMY_SEED_DEPS:-false}
      <<: *gha-build
    restart: on-failure:3
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Ensure migrations have access to user uploads (for seeding example images)
      - user_uploads:/opt/relab/backend-migrations/data/uploads
    environment:
      DATABASE_HOST: postgres
      REDIS_HOST: redis
      DEBUG: ${DEBUG:-false}
      SEED_DUMMY_DATA: ${SEED_DUMMY_DATA:-false}
      SEED_CPV_CATEGORIES: ${SEED_CPV_CATEGORIES:-false}
      SEED_CPV_PRODUCT_TYPES: ${SEED_CPV_PRODUCT_TYPES:-false}
      SEED_HS_CATEGORIES: ${SEED_HS_CATEGORIES:-false}
    profiles:
      - migrations
    networks:
      - data

  redis:
    image: redis:8-alpine@sha256:81b6f81d6a6c5b9019231a2e8eb10085e3a139a34f833dcc965a8a959b040b72
    restart: unless-stopped
    healthcheck:
      <<: *healthcheck-defaults
      test: [ "CMD-SHELL", "redis-cli $${REDIS_PASSWORD:+-a $${REDIS_PASSWORD}} ping | grep -q PONG" ]
      start_period: 5s
    command: [ "sh", "-c", "redis-server --appendonly yes --save 60 1 $${REDIS_PASSWORD:+--requirepass $${REDIS_PASSWORD}}" ] # spell-checker: ignore requirepass
    networks:
      - data

  postgres:
    image: postgres:18@sha256:78481659c47e862334611ccdaf7c369c986b3046da9857112f3b309114a65fb4
    restart: unless-stopped
    volumes:
      - database_data:/var/lib/postgresql
      # Postgres runs initdb files in sorted order on fresh volumes.
      - ./deploy/postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      <<: *healthcheck-defaults
      test: [ "CMD-SHELL", "pg_isready -h localhost -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      start_period: 5s
    networks:
      - data

  docs:
    build:
      context: ./docs
      <<: *gha-build
    restart: unless-stopped
    networks:
      - edge

  app:
    build:
      context: ./app
      <<: *gha-build
    restart: unless-stopped
    networks:
      - edge

  www:
    build:
      context: ./www
      <<: *gha-build
    restart: unless-stopped
    networks:
      - edge

volumes:
  database_data:
  user_uploads:

networks:
  edge:
  data:
    internal: true
