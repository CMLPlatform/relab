<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Reverse Engineering Lab API</title>
    <link rel="stylesheet" href="/static/css/styles.css" />
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon" />
    <link rel="shortcut icon" href="/static/favicon.ico" type="image/x-icon" />
    <script src="/static/js/backend-login.js" defer></script>
  </head>
  <body>
    <div class="container">
      <h1>Login</h1>
      <form id="loginForm" data-login-url="/v1/auth/session/login" data-default-next="{{ url_for('index') }}">
        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            autocomplete="username"
            autocorrect="off"
            autocapitalize="none"
            spellcheck="false"
            required
          />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            autocomplete="current-password"
            autocorrect="off"
            autocapitalize="none"
            spellcheck="false"
            required
          />
        </div>
        <div id="error" class="error" hidden></div>
        {% if next %}
          <input type="hidden" id="next" name="next" value="{{ next|e }}" />
        {% endif %}
        <button type="submit" class="primary-btn">Login</button>
        <a href="{{ url_for('index') }}" class="secondary-btn back-link">API Homepage</a>
      </form>
    </div>
  </body>
</html>
