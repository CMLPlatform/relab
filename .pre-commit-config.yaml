# Repository-wide pre-commit policy hooks.
# Project-specific linting and test commands live in the subrepo `justfile`s.

# spell-checker: ignore rhysd

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/executablebooks/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        additional_dependencies:
          - mdformat-gfm>=1.0.0
          - mdformat-front-matters
          - mdformat-ruff

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        exclude: ^backend/app/api/auth/resources/disposable_email_domains\.txt$
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-toml
      - id: check-yaml
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: no-commit-to-branch
      - id: trailing-whitespace
        args: [ "--markdown-linebreak-ext", "md" ]
        exclude: ^.*/build/.*\.html$

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
        files: ^\.github/workflows/.*\.ya?ml$

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        args: [ "--external-sources", "--source-path=SCRIPTDIR:." ]
        exclude: (^|/)(node_modules|\.venv)/

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.9
    hooks:
      - id: commitizen
        stages: [ commit-msg ]

  - repo: https://github.com/simonvanlierde/check-json5
    rev: v1.1.0
    hooks:
      - id: check-json5
        exclude: '^(?:frontend[^/]*(?:/.*)?/data/.*\.json|(?:.*/)?package-lock\.json)$'

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.1
    hooks:
      - id: uv-lock
        name: uv-lock-root
        files: ^(uv\.lock|pyproject\.toml|uv\.toml)$
        entry: uv lock
      - id: uv-lock
        name: uv-lock-backend
        files: ^backend/(uv\.lock|pyproject\.toml|uv\.toml)$
        entry: uv lock --project backend
      - id: uv-lock
        name: uv-lock-docs
        files: ^docs/(uv\.lock|pyproject\.toml|uv\.toml)$
        entry: uv lock --project docs

  - repo: local
    hooks:
      - id: cspell
        name: cspell
        entry: pnpm exec cspell
        language: system
        types: [ text ]
        # Disable cspell caching as pre-commit and CI doesn't play well with it.
        args: [ "--no-cache", "--no-must-find-files" ]
      - id: pnpm-lock-frontend-app
        name: pnpm-lock-frontend-app
        entry: just frontend-app/lockfile
        language: system
        files: ^frontend-app/package\.json$
        pass_filenames: false
      - id: pnpm-lock-frontend-web
        name: pnpm-lock-frontend-web
        entry: just frontend-web/lockfile
        language: system
        files: ^frontend-web/package\.json$
        pass_filenames: false
