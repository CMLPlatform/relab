name: relab_staging

services:
  backend:
    env_file: ./backend/.env.staging
    environment:
      ENVIRONMENT: staging
      # Trust forwarded headers only from Docker-internal proxy addresses.
      FORWARDED_ALLOW_IPS: 172.16.0.0/12
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT_STAGING:-http://otel-collector:4318}
      # ── Resource knobs (see compose.prod.yml for details) ────────────────────────
      WEB_CONCURRENCY: "2"
      IMAGE_RESIZE_WORKERS: "5"
      DB_POOL_SIZE: "10"
      DB_POOL_MAX_OVERFLOW: "10"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0@sha256:611f7b58a12086c8ff8c752f5cb1cce3c88eec52d7374d8f273a609fdb9c0f63
    command: [ "--config=/etc/otelcol-contrib/config.yaml" ]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      - jaeger
    profiles:
      - telemetry
    restart: unless-stopped

  jaeger:
    image: jaegertracing/jaeger:2.6.0@sha256:5765e3da84e6e0dce8c1f39d33044f98f2519db15fbce0d7befc04df9e498f10
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # Jaeger UI
    profiles:
      - telemetry
    restart: unless-stopped

  backend-migrations:
    env_file: ./backend/.env.staging
    environment:
      SEED_DUMMY_DATA: True

  cloudflared:
    image: cloudflare/cloudflared:latest@sha256:89ee50efb1e9cb2ae30281a8a404fed95eb8f02f0a972617526f8c5b417acae2
    command: tunnel --no-autoupdate run
    depends_on:
      backend:
        condition: service_healthy
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN_STAGING}
    restart: unless-stopped

  docs:
    build:
      args:
        BUILD_MODE: staging

  frontend-web:
    build:
      args:
        BUILD_MODE: staging

  frontend-app:
    build:
      args:
        BUILD_MODE: staging
    environment:
      # Needed by Caddyfile to determine the API origin for the staging environment.
      CSP_API_ORIGIN: https://api-test.cml-relab.org

  cache:
    env_file: ./backend/.env.staging

  database:
    env_file: ./backend/.env.staging
