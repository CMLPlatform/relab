name: relab_staging

services:
  backend:
    env_file: ./backend/.env.staging
    environment:
      ENVIRONMENT: staging
      # Trust forwarded headers only from Docker-internal proxy addresses.
      FORWARDED_ALLOW_IPS: 172.16.0.0/12

  backend-migrations:
    env_file: ./backend/.env.staging
    environment:
      SEED_DUMMY_DATA: True

  cloudflared:
    image: cloudflare/cloudflared:latest@sha256:89ee50efb1e9cb2ae30281a8a404fed95eb8f02f0a972617526f8c5b417acae2
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN_STAGING}
    restart: unless-stopped

  docs:
    build:
      args:
        BUILD_MODE: staging

  frontend-web:
    build:
      args:
        BUILD_MODE: staging

  frontend-app:
    build:
      args:
        BUILD_MODE: staging

  cache:
    env_file: ./backend/.env.staging

  database:
    env_file: ./backend/.env.staging
