name: relab_staging

services:
  frontend-web:
    build:
      args:
        BUILD_MODE: staging

  frontend-app:
    build:
      args:
        BUILD_MODE: staging

  backend:
    environment:
      ENVIRONMENT: staging
      # URLs for the test frontend
      FRONTEND_WEB_URL: https://web-test.cml-relab.org
      FRONTEND_APP_URL: https://app-test.cml-relab.org

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN_STAGING}
    restart: unless-stopped

  backend-migrations:
    environment:
      SEED_DUMMY_DATA: True
