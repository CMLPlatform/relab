# compose.ci.yaml (CI environment for backend unit/integration tests)
# Provides credentials via .env.test so services can start without real secrets.
name: relab_test

services:
  api:
    environment:
      ENVIRONMENT: testing
    env_file: ./backend/.env.test

  migrator:
    env_file: ./backend/.env.test

  postgres:
    env_file: ./backend/.env.test

  redis:
    env_file: ./backend/.env.test

  app:
    build:
      args:
        ENVIRONMENT: test
        EXPO_PUBLIC_API_URL: http://localhost:8000
        EXPO_PUBLIC_WEBSITE_URL: http://localhost:8010
        EXPO_PUBLIC_DOCS_URL: http://localhost:8012
    environment:
      CADDY_API_ORIGIN: http://localhost:8000

  www:
    build:
      args:
        ENVIRONMENT: test
