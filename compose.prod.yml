# docker-compose.prod.yml (PRODUCTION - must be explicitly specified)
name: relab_prod # Separate prod containers, networks, and volumes from dev

services:
  backend:
    environment:
      ENVIRONMENT: prod
      # Trust forwarded headers only from Docker-internal proxy addresses.
      FORWARDED_ALLOW_IPS: 172.16.0.0/12
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT_PROD:-http://otel-collector:4318}
      # ── Resource knobs ──────────────────────────────────────────────────────────
      # WEB_CONCURRENCY = Uvicorn worker processes (~1 CPU core each).
      # All other values are per worker; totals = WEB_CONCURRENCY x per-worker value.
      # Lower WEB_CONCURRENCY to reduce load on a shared server.
      #
      #                    per worker  x  workers  =  total
      # Image threads:          5      x     4     =   20  (CPU-bound)
      # DB connections:    10 + 10     x     4     =   80  (PostgreSQL default max=100)
      # Outbound HTTP:        100      x     4     =  400  (mostly idle)
      WEB_CONCURRENCY: "4"
      IMAGE_RESIZE_WORKERS: "5"
      DB_POOL_SIZE: "10"
      DB_POOL_MAX_OVERFLOW: "10"
    env_file: ./backend/.env.prod

  backend-migrations:
    env_file: ./backend/.env.prod

  # TODO: Consider moving the backup services to cron on the host machine instead of running in containers
  backend-user-upload-backups:
    # Automated user uploads backups to local file system
    build:
      context: ./backend
      dockerfile: Dockerfile.user-upload-backups
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    volumes:
      - user_uploads:/data/uploads:ro
      - ${BACKUP_DIR:-./backend/backups}/user_uploads:/backups
    environment:
      SCHEDULE: 0 2 * * * # Daily at 2am
      UPLOADS_DIR: /data/uploads # NOTE: this is the path inside the container
      UPLOADS_BACKUP_DIR: /backups # NOTE: this is the path inside the container
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      MAX_TOTAL_GB: 100
    profiles:
      - backups

  cache:
    volumes:
      # Persist cache data in production
      - cache_data:/data
    env_file: ./backend/.env.prod

  cloudflared:
    # Cloudflared tunnel service
    image: cloudflare/cloudflared:latest@sha256:89ee50efb1e9cb2ae30281a8a404fed95eb8f02f0a972617526f8c5b417acae2
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN_PROD}
    command: tunnel --no-autoupdate run
    pull_policy: always

  database:
    env_file: ./backend/.env.prod

  database-backups:
    # Automated database backups to local file system
    image: prodrigestivill/postgres-backup-local:18@sha256:f70742ebe42b2277689b028d1fd15aa80f77cffa01da163cc9f85a6ff1866e7f # spell-checker: ignore prodrigestivill
    restart: unless-stopped
    depends_on:
      database:
        condition: service_started
    volumes:
      - ${BACKUP_DIR:-./backend/backups}/postgres_db:/backups
    environment:
      SCHEDULE: 0 2 * * * # Daily at 2am
      POSTGRES_HOST: database
      POSTGRES_EXTRA_OPTS: "--compress=zstd:3 --schema=public" # Compress backups, only back up public schema
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
    env_file: ./backend/.env.prod # Load database connection settings
    profiles:
      - backups

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0@sha256:611f7b58a12086c8ff8c752f5cb1cce3c88eec52d7374d8f273a609fdb9c0f63
    restart: unless-stopped
    depends_on:
      - jaeger
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    command: [ "--config=/etc/otelcol-contrib/config.yaml" ]
    profiles:
      - telemetry

  jaeger:
    image: jaegertracing/jaeger:2.6.0@sha256:5765e3da84e6e0dce8c1f39d33044f98f2519db15fbce0d7befc04df9e498f10
    restart: unless-stopped
    ports:
      - "16686:16686" # Jaeger UI
    volumes:
      - jaeger_data:/badger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    profiles:
      - telemetry

volumes:
  cache_data:
  jaeger_data:
